<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=5.0'>
<meta name='mobile-web-app-capable' content='yes'>
<meta name='apple-mobile-web-app-capable' content='yes'>
<title>AFACR Revision and Practice System</title>
<style>
:root {
    --bg:#eef2f7; --card:#ffffff; --text:#1a1d23; --primary:#1e40af; --primary-dark:#1e3a8a;
    --accent:#dbeafe; --border:#e2e8f0; --tip-bg:#fef3c7; --tip-border:#f59e0b;
    --success:#10b981; --success-bg:#d1fae5; --danger:#ef4444; --danger-bg:#fee2e2;
    --sidebar-bg:#ffffff; --purple:#8b5cf6; --purple-bg:#ede9fe;
    --gradient:linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
}
[data-theme="dark"] {
    --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --primary:#60a5fa; --primary-dark:#3b82f6;
    --accent:#1e3a5f; --border:#334155; --tip-bg:#3f2e17; --tip-border:#f59e0b;
    --success:#34d399; --success-bg:#064e3b; --danger:#f87171; --danger-bg:#7f1d1d;
    --sidebar-bg:#1e293b; --purple:#a78bfa; --purple-bg:#4c1d95;
    --gradient:linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin:0; color: var(--text); font-size: var(--font-size, 15px); transition: background 0.3s; -webkit-text-size-adjust: 100%; }
header { background: var(--gradient); color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.hamburger { display: none; background: rgba(255,255,255,0.2); border: none; color: white; width: 44px; height: 44px; border-radius: 8px; cursor: pointer; font-size: 22px; flex-shrink: 0; }
.header-info { min-width: 0; }
.header-info h1 { margin:0; font-size: 20px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-info .prepared { font-size: 11px; opacity: 0.9; margin-top: 3px; }
.header-info .prepared a { color: #ffd700; text-decoration: none; }
.controls { display: flex; gap: 6px; flex-wrap: wrap; }
.controls button { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 13px; font-weight: 600; min-height: 40px; touch-action: manipulation; }
.controls button:active { background: rgba(255,255,255,0.35); }
.layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; max-width: 1400px; margin: 16px auto; padding: 0 16px; }
.sidebar { background: var(--sidebar-bg); border-radius: 14px; padding: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); height: max-content; position: sticky; top: 90px; max-height: calc(100vh - 110px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.main { background: var(--card); border-radius: 14px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); min-height: 500px; }
.section-title { font-weight: 700; margin: 14px 0 6px; color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.navbtn { display: block; width: 100%; text-align: left; margin: 5px 0; padding: 12px 14px; border: 1px solid var(--border); background: var(--card); border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text); font-weight: 500; min-height: 44px; touch-action: manipulation; }
.navbtn:active { background: var(--accent); }
.navbtn.done { border-color: var(--success); background: var(--success-bg); font-weight: 600; }
.navbtn.section-test { background: var(--primary); color: white; font-weight: 700; margin-top: 6px; }
.navbtn.special { background: var(--purple); color: white; font-weight: 700; }
.badge { display: inline-block; background: var(--accent); color: var(--primary); padding: 5px 10px; border-radius: 20px; font-weight: 600; font-size: 12px; margin: 3px 3px 3px 0; }
.badge.success { background: var(--success-bg); color: var(--success); }
.badge.purple { background: var(--purple-bg); color: var(--purple); }
h2 { color: var(--primary); margin-top: 0; font-weight: 700; font-size: 22px; }
h3 { color: var(--primary); margin-bottom: 6px; font-weight: 600; font-size: 17px; }
.card { border: 1px solid var(--border); background: var(--card); border-radius: 12px; padding: 16px; margin: 12px 0; }
.card.gradient { background: var(--gradient); color: white; border: none; }
.card.gradient h3, .card.gradient h2 { color: white; }
.lesson { line-height: 1.7; word-wrap: break-word; }
.lesson table { border-collapse: collapse; margin: 10px 0; width: 100%; font-size: 13px; }
.lesson th, .lesson td { border: 1px solid var(--border); padding: 6px; text-align: left; }
.lesson th { background: var(--accent); color: var(--primary); font-weight: 700; }
.tip { border-left: 4px solid var(--tip-border); background: var(--tip-bg); padding: 12px; border-radius: 8px; margin-top: 12px; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
button.act { padding: 12px 18px; border: 0; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; min-height: 44px; touch-action: manipulation; }
button.act:active { transform: scale(0.98); }
button.act:disabled { opacity: 0.5; cursor: not-allowed; }
.primary { background: var(--primary); color: white; }
.secondary { background: #64748b; color: white; }
.success { background: var(--success); color: white; }
.warning { background: #f59e0b; color: white; }
.danger { background: var(--danger); color: white; }
.option { display: block; width: 100%; text-align: left; padding: 14px; margin: 10px 0; border: 2px solid var(--border); border-radius: 10px; background: var(--card); cursor: pointer; font-size: 15px; color: var(--text); font-weight: 500; min-height: 50px; touch-action: manipulation; }
.option:active:not(:disabled) { background: var(--accent); }
.option.correct { background: var(--success-bg) !important; border-color: var(--success); font-weight: 600; }
.option.incorrect { background: var(--danger-bg) !important; border-color: var(--danger); font-weight: 600; }
.feedback { padding: 14px; border-radius: 10px; margin-top: 12px; display: none; line-height: 1.6; }
.feedback.good { display: block; background: var(--success-bg); border: 2px solid var(--success); }
.feedback.bad { display: block; background: var(--danger-bg); border: 2px solid var(--danger); }
.working { background: var(--accent); border-left: 4px solid var(--primary); padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 14px; line-height: 1.6; }
.progress { height: 10px; background: var(--border); border-radius: 30px; overflow: hidden; margin: 8px 0; }
.bar { height: 100%; background: var(--success); width: 0%; transition: width 0.5s; }
.qmeta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; padding: 10px 12px; background: var(--accent); border-radius: 10px; }
.bookmark-btn { background: transparent; border: 2px solid var(--border); border-radius: 8px; padding: 8px 14px; cursor: pointer; color: var(--text); font-weight: 600; min-height: 40px; touch-action: manipulation; }
.bookmark-btn.on { background: #fbbf24; color: #78350f; border-color: #fbbf24; }
.qpalette { display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr)); gap: 6px; padding: 12px; background: var(--accent); border-radius: 10px; margin: 10px 0; max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.qnum { padding: 10px 4px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; background: var(--card); border: 2px solid var(--border); min-height: 44px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
.qnum:active { transform: scale(0.95); }
.qnum.current { background: var(--primary); color: white; border-color: var(--primary-dark); }
.qnum.correct { background: var(--success-bg); border-color: var(--success); color: var(--success); }
.qnum.incorrect { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
.qnum.answered { border-width: 3px; }
.qnav { display: flex; gap: 8px; justify-content: space-between; margin-top: 14px; align-items: center; flex-wrap: wrap; }
.qnav-left, .qnav-right { display: flex; gap: 6px; flex-wrap: wrap; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-start; justify-content: center; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.modal.on { display: flex; }
.modal-content { background: var(--card); border-radius: 14px; padding: 20px; max-width: 750px; width: 100%; max-height: 90vh; overflow-y: auto; margin: auto; -webkit-overflow-scrolling: touch; }
.close { float: right; cursor: pointer; font-size: 26px; color: var(--text); background: none; border: none; font-weight: bold; padding: 4px 12px; }
.dashboard-card { display: inline-block; width: calc(50% - 12px); margin: 5px; padding: 16px; background: var(--accent); border-radius: 12px; vertical-align: top; }
.stat-num { font-size: 28px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text); opacity: 0.8; margin-top: 4px; }
.diff-selector { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
.diff-selector button { padding: 10px 16px; border: 2px solid var(--border); background: var(--card); border-radius: 8px; cursor: pointer; color: var(--text); font-weight: 600; min-height: 44px; touch-action: manipulation; }
.diff-selector button.active { background: var(--primary); color: white; border-color: var(--primary); }
.matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
.match-col { background: var(--accent); padding: 12px; border-radius: 10px; }
.match-col h4 { margin-top: 0; }
.match-item { padding: 12px; margin: 7px 0; background: var(--card); border-radius: 8px; cursor: pointer; border: 2px solid var(--border); font-size: 14px; font-weight: 500; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
.match-item.selected { background: var(--purple-bg); border-color: var(--purple); box-shadow: 0 0 0 3px rgba(139,92,246,0.3); }
.match-item.used { opacity: 0.35; pointer-events: none; }
.match-slot { padding: 12px; margin: 7px 0; background: var(--card); border-radius: 8px; border: 2px dashed var(--border); min-height: 46px; font-size: 14px; cursor: pointer; touch-action: manipulation; }
.match-slot.correct { background: var(--success-bg); border-color: var(--success); border-style: solid; }
.match-slot.incorrect { background: var(--danger-bg); border-color: var(--danger); border-style: solid; }
.footer { text-align: center; padding: 20px; color: var(--text); opacity: 0.7; font-size: 12px; margin-top: 20px; }
.footer a { color: var(--primary); text-decoration: none; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; margin: 8px 0; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 2px solid var(--border); }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
.sidebar-overlay.on { display: block; }

/* MOBILE-FIRST RESPONSIVE */
@media(max-width: 900px) {
    .hamburger { display: flex; align-items: center; justify-content: center; }
    .header-info h1 { font-size: 15px; }
    .header-info .prepared { font-size: 10px; }
    .controls button { padding: 7px 10px; font-size: 12px; min-height: 36px; }
    .layout { grid-template-columns: 1fr; padding: 0 12px; margin: 12px auto; gap: 12px; }
    .sidebar { position: fixed; left: -320px; top: 0; height: 100vh; max-height: 100vh; width: 300px; z-index: 95; border-radius: 0; transition: left 0.3s; padding-top: 20px; }
    .sidebar.open { left: 0; }
    .main { padding: 16px; border-radius: 12px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    .lesson { font-size: 14px; }
    .lesson table { font-size: 12px; }
    .dashboard-card { width: calc(100% - 10px); margin: 5px 0; }
    .matching-grid { grid-template-columns: 1fr; }
    .qmeta { padding: 8px; gap: 6px; }
    .badge { font-size: 11px; padding: 4px 8px; }
    .option { font-size: 14px; padding: 12px; }
    .qpalette { grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); }
    .qnum { padding: 8px 2px; font-size: 13px; min-height: 40px; }
    .qnav-left, .qnav-right { width: 100%; justify-content: stretch; }
    .qnav button { flex: 1; }
    button.act { padding: 12px 12px; font-size: 13px; }
    .card { padding: 14px; }
    .working { font-size: 13px; }
    .stat-num { font-size: 24px; }
    .modal-content { padding: 16px; margin: 10px auto; }
    header { padding: 12px 14px; gap: 8px; }
}
@media(max-width: 480px) {
    .header-info h1 { font-size: 14px; }
    .controls button { padding: 6px 9px; font-size: 11px; min-height: 34px; }
    .controls button:nth-child(n+4) { display: none; }
    .layout { padding: 0 8px; margin: 8px auto; }
    .main { padding: 12px; }
    h2 { font-size: 17px; }
    .qmeta { flex-direction: column; align-items: flex-start; }
    .qnum { font-size: 12px; padding: 6px 2px; min-height: 38px; }
}
</style>
</head>
<body>
<header>
    <div class='header-left'>
        <button class='hamburger' onclick='toggleSidebar()' aria-label='Menu'>&#9776;</button>
        <div class='header-info'>
            <h1>📚 AFACR Revision and Practice</h1>
            <div class='prepared'>By <b>Muhammad Hussain</b> · <a href='mailto:ac.hussain07@gmail.com'>ac.hussain07@gmail.com</a></div>
        </div>
    </div>
    <div class='controls'>
        <button onclick='toggleTheme()'>🌙</button>
        <button onclick='changeFontSize(1)'>A+</button>
        <button onclick='changeFontSize(-1)'>A-</button>
        <button onclick='showFormulas()'>📐 Formulas</button>
        <button onclick='showBookmarks()'>⭐ Bookmarks</button>
    </div>
</header>
<div class='sidebar-overlay' id='sidebarOverlay' onclick='closeSidebar()'></div>
<div class='layout'>
    <aside class='sidebar' id='sidebar'></aside>
    <main class='main' id='main'></main>
</div>
<div class='modal' id='modal'>
    <div class='modal-content'>
        <button class='close' onclick='closeModal()'>&times;</button>
        <div id='modalBody'></div>
    </div>
</div>
<div class='footer'>
    © 2026 AFACR Revision and Practice System · Prepared by Muhammad Hussain · <a href='mailto:ac.hussain07@gmail.com'>ac.hussain07@gmail.com</a>
</div>
<script>
const DATA = {"topics": [{"id": "1", "section": "A", "title": "Substance over Form", "weight": "30%", "lesson": "<h3>1. Core concept</h3><p><b>Substance over form</b> means financial statements must reflect the <b>economic reality</b> of a transaction, not just its legal form.</p>\n<h3>2. Framework</h3><ol><li>Read legal wording.</li><li>Identify risks: default, damage, obsolescence.</li><li>Identify rewards: cash flows, use, gains.</li><li>Identify control.</li><li>Apply economic reality.</li></ol>\n<h3>3. Numerical Example — Sale and Repurchase</h3><p>A sells equipment for Rs. 1,000,000, must repurchase after 1 year for Rs. 1,120,000.</p><ul><li>Legal: Sale. Substance: Financing.</li><li>Loan liability: Rs. 1,000,000. Finance cost: Rs. 120,000.</li></ul>\n<h3>4. Factoring with Recourse</h3><p>Receivables Rs. 2,000,000 factored for Rs. 1,850,000. Company reimburses bad debts.</p><ul><li>Credit risk retained → do NOT derecognize.</li><li>Recognize loan Rs. 1,850,000 + finance cost Rs. 150,000.</li></ul>\n<h3>5. Common exam areas</h3><ul><li>Sale and repurchase</li><li>Consignment inventory</li><li>Factoring with recourse</li><li>Special purpose entities</li><li>Sale and leaseback</li></ul>", "tip": "Ask: who bears risk, gets reward, holds control?"}, {"id": "2", "section": "A", "title": "Financial Instruments — IAS 32, IFRS 7 & IFRS 9", "weight": "30%", "lesson": "<h3>1. Definition</h3><p>Contract creating financial asset for one party and financial liability/equity for another.</p>\n<h3>2. IAS 32 — Liability vs Equity</h3><ul><li><b>Liability:</b> contractual obligation to deliver cash.</li><li><b>Equity:</b> residual interest.</li></ul>\n<h3>3. IFRS 9 — Classification</h3><table border=1 cellpadding=6><tr><th>Business Model</th><th>SPPI</th><th>Measurement</th></tr><tr><td>Hold to collect</td><td>Pass</td><td>Amortised Cost</td></tr><tr><td>Hold to collect + sell</td><td>Pass</td><td>FVOCI</td></tr><tr><td>Trading / SPPI fails</td><td>—</td><td>FVTPL</td></tr></table>\n<h3>4. Amortised Cost & EIR Example</h3><p>Bond Rs. 950,000, face Rs. 1,000,000, EIR 10%, coupon Rs. 60,000.</p><ul><li>Interest Y1 = 950,000 × 10% = Rs. 95,000</li><li>Closing = 950,000 + 95,000 − 60,000 = Rs. 985,000</li></ul>\n<h3>5. ECL Impairment Stages</h3><ul><li>Stage 1: No SICR → 12-month ECL.</li><li>Stage 2: SICR → Lifetime ECL.</li><li>Stage 3: Credit impaired → Lifetime ECL + interest on net.</li></ul>\n<h3>6. Hedge Accounting</h3><p>Fair value hedge, cash flow hedge, hedge of net investment.</p>\n<h3>7. IFRS 7</h3><p>Disclose credit risk, liquidity risk, market risk with sensitivity analysis.</p>", "tip": "Master: (a) classification, (b) EIR/amortised cost, (c) ECL 3 stages."}, {"id": "3", "section": "A", "title": "Employee Benefits — IAS 19", "weight": "30%", "lesson": "<h3>1. Four categories</h3><ul><li>Short-term (within 12 months)</li><li>Post-employment</li><li>Other long-term</li><li>Termination</li></ul>\n<h3>2. Defined Contribution vs Benefit</h3><table border=1 cellpadding=6><tr><th></th><th>Contribution</th><th>Benefit</th></tr><tr><td>Obligation</td><td>Fixed contribution</td><td>Promised benefit</td></tr><tr><td>Risk</td><td>Employee</td><td>Employer</td></tr></table>\n<h3>3. Defined Benefit Example</h3><p>PV obligation Rs. 5,000,000, plan assets Rs. 4,200,000, rate 8%, service cost Rs. 300,000.</p><ul><li>Net liability opening = Rs. 800,000</li><li>Interest on obligation = 400,000; on assets = 336,000</li><li>Net interest cost = Rs. 64,000</li><li>P&L expense = 300,000 + 64,000 = Rs. 364,000</li></ul>\n<h3>4. Remeasurements</h3><p>Actuarial gains/losses → OCI (never recycled).</p>", "tip": "P&L = Service cost + Net interest. OCI = Remeasurements."}, {"id": "4", "section": "A", "title": "Share-Based Payments — IFRS 2", "weight": "30%", "lesson": "<h3>1. Three types</h3><ul><li><b>Equity-settled:</b> shares/options. Grant-date FV. Not remeasured.</li><li><b>Cash-settled:</b> SARs. Remeasured each period.</li><li><b>Choice:</b> analyse liability/equity.</li></ul>\n<h3>2. Equity-Settled Example</h3><p>100 employees × 500 options × Rs. 12. Vesting 3 years. Expected leavers 15.</p><p>Y1: 12 left, expect 10 more.</p><ul><li>Expected vesting = 78</li><li>Cumulative Y1 = 78 × 500 × 12 × 1/3 = Rs. 156,000</li></ul>\n<h3>3. Cash-Settled Example</h3><p>200 SARs, vesting 3 years, FV: Y1=8, Y2=10, Y3=12.</p><ul><li>Y1 liability = 200 × 8 × 1/3 = 533</li><li>Y2 = 200 × 10 × 2/3 = 1,333; expense = 800</li><li>Y3 = 200 × 12 = 2,400; expense = 1,067</li></ul>", "tip": "Equity = grant FV. Cash-settled = current FV, remeasured."}, {"id": "5", "section": "A", "title": "Asset Valuation & Changing Prices", "weight": "30%", "lesson": "<h3>1. Impairment (IAS 36)</h3><p>Impaired if <b>Carrying &gt; Recoverable</b>.</p><p><b>Recoverable = HIGHER of FVLCD and VIU</b></p>\n<h3>2. Example</h3><p>CA Rs. 1,500,000, FVLCD Rs. 1,200,000, VIU Rs. 1,350,000.</p><ul><li>Recoverable = Rs. 1,350,000</li><li>Impairment = Rs. 150,000</li></ul>\n<h3>3. VIU</h3><p>PV of future cash flows from asset use + disposal.</p>\n<h3>4. Changing Prices</h3><ul><li>Historical cost</li><li>Current cost</li><li>Constant purchasing power</li></ul>\n<h3>5. Reversal</h3><p>Allowed for all assets except goodwill.</p>", "tip": "Recoverable = HIGHER of FVLCD and VIU."}, {"id": "6", "section": "A", "title": "Earnings Per Share — IAS 33", "weight": "30%", "lesson": "<h3>1. Basic EPS</h3><p><b>Basic EPS = (Profit − Preference Div) / Weighted Avg Ordinary Shares</b></p>\n<h3>2. Example</h3><p>PAT Rs. 5,000,000, Pref Div Rs. 500,000. Shares: 1,000,000 Jan; 400,000 issued Jul.</p><ul><li>Attributable = Rs. 4,500,000</li><li>Weighted = 1,000,000 × 12/12 + 400,000 × 6/12 = 1,200,000</li><li>Basic EPS = Rs. 3.75</li></ul>\n<h3>3. Bonus Issue</h3><p>Retrospective. 1-for-4 bonus on 1,000,000 → weighted 1,250,000 whole year.</p>\n<h3>4. Diluted EPS</h3><p>Adjust for potential dilutive shares.</p><p>Convertible Rs. 2,000,000 at 8%, tax 30%, converts to 200,000 shares.</p><ul><li>Interest saved (net) = 2,000,000 × 8% × 70% = 112,000</li><li>Diluted = 4,612,000 / 1,400,000 = Rs. 3.29</li></ul>", "tip": "Deduct pref div. Time-weight new issues (not bonus)."}, {"id": "7", "section": "A", "title": "Other Financial Reporting Standards", "weight": "30%", "lesson": "<h3>1. IFRS 6 — E&E</h3><p>Entity develops own policy for mineral exploration expenditures.</p>\n<h3>2. IFRS 14</h3><p>First-time IFRS adopters with rate-regulated activities.</p>\n<h3>3. IAS 26</h3><p>FS of retirement benefit plan (not employer).</p>\n<h3>4. IAS 29 — Hyperinflation</h3><p>Applies when 3-year cumulative inflation ≥ 100%. Restate non-monetary items.</p><p>Example: Asset Rs. 500,000 at index 100. Current 250 → restated = Rs. 1,250,000.</p>\n<h3>5. IAS 34 — Interim</h3><p>Same policies as annual. Condensed FS + notes.</p>", "tip": "Know scope, main measurement, one trick calculation per standard."}, {"id": "8", "section": "B", "title": "Introduction to Group Accounting", "weight": "30%", "lesson": "<h3>1. Group = Parent + Subsidiaries</h3><p>Under parent's control. Consolidated as single economic entity.</p>\n<h3>2. Control (IFRS 10)</h3><ol><li>Power over investee</li><li>Exposure to variable returns</li><li>Ability to use power</li></ol>\n<h3>3. Investment Types</h3><table border=1 cellpadding=6><tr><th>Holding</th><th>Type</th><th>Method</th></tr><tr><td>&gt;50%</td><td>Subsidiary</td><td>Full consolidation</td></tr><tr><td>20-50%</td><td>Associate</td><td>Equity method</td></tr><tr><td>Joint control</td><td>JV</td><td>Equity method</td></tr><tr><td>&lt;20%</td><td>Investment</td><td>IFRS 9</td></tr></table>\n<h3>4. Exemptions</h3><ul><li>Wholly-owned intermediate parent</li><li>Ultimate parent produces IFRS FS</li><li>Not publicly traded</li></ul>", "tip": "Draw structure first. Identify control/influence."}, {"id": "9", "section": "B", "title": "Consolidated Statement of Financial Position", "weight": "30%", "lesson": "<h3>1. Six Steps</h3><ol><li>Add line-by-line</li><li>Eliminate investment</li><li>Goodwill</li><li>NCI</li><li>Group retained earnings</li><li>Eliminate intra-group + URP + FV adjustments</li></ol>\n<h3>2. Goodwill Formula</h3><p><b>Goodwill = Consideration + NCI at acq + FV previous holding − FV Net Assets</b></p>\n<h3>3. Example</h3><p>P acquires 80% of S for Rs. 1,200,000. NCI FV Rs. 260,000. Net assets FV Rs. 1,300,000. Year-end net assets Rs. 1,600,000.</p><ul><li>Goodwill = 1,200,000 + 260,000 − 1,300,000 = Rs. 160,000</li><li>NCI at year-end = 260,000 + 20% × 300,000 = Rs. 320,000</li></ul>\n<h3>4. URP Example</h3><p>P sold to S Rs. 200,000 at cost+25%. S holds Rs. 60,000.</p><ul><li>Margin on selling = 25/125 = 20%</li><li>URP = 60,000 × 20% = Rs. 12,000</li></ul>\n<h3>5. FV Adjustments</h3><p>Revalue at acquisition. Extra depreciation reduces post-acq profit.</p>", "tip": "Goodwill = What paid − What got."}, {"id": "10", "section": "B", "title": "Consolidated Statement of Comprehensive Income", "weight": "30%", "lesson": "<h3>1. Key Rules</h3><ul><li>Subsidiary from acq date only</li><li>Add 100% revenue/expenses</li><li>Eliminate intra-group sales/dividends/interest</li><li>Adjust URP in inventory</li><li>Allocate profit: Parent vs NCI</li></ul>\n<h3>2. Mid-Year Acquisition</h3><p>P acquired 75% of S on 1-Apr. Revenue Rs. 1,600,000, expenses Rs. 1,200,000 (even).</p><ul><li>Post-acq (9 months): Rev Rs. 1,200,000; Exp Rs. 900,000; Profit Rs. 300,000</li><li>NCI = 25% × 300,000 = Rs. 75,000</li></ul>\n<h3>3. Intra-Group Sales</h3><p>P sold Rs. 500,000 to S. Dr Revenue 500,000 / Cr COGS 500,000.</p>\n<h3>4. URP</h3><p>S holds Rs. 100,000, margin 20%. URP Rs. 20,000. Increase COGS, reduce inventory.</p>", "tip": "Time-apportion. Eliminate all intra-group."}, {"id": "11", "section": "B", "title": "IAS 27, IFRS 10, IFRS 3 & IFRS 13", "weight": "30%", "lesson": "<h3>1. Standards Map</h3><table border=1 cellpadding=6><tr><th>Standard</th><th>Scope</th></tr><tr><td>IFRS 10</td><td>Control & Consolidation</td></tr><tr><td>IFRS 3</td><td>Business Combinations</td></tr><tr><td>IAS 27</td><td>Separate FS</td></tr><tr><td>IFRS 13</td><td>Fair Value</td></tr></table>\n<h3>2. IFRS 3 Steps</h3><ol><li>Identify acquirer</li><li>Acquisition date</li><li>Recognize assets/liabs at FV</li><li>Goodwill/bargain purchase</li><li>Measure NCI</li></ol>\n<h3>3. IFRS 13 Hierarchy</h3><ul><li>Level 1: Quoted prices, active markets</li><li>Level 2: Observable inputs</li><li>Level 3: Unobservable</li></ul>\n<h3>4. Bargain Purchase Example</h3><p>Consideration 800,000. NCI 200,000. Net assets 1,100,000.</p><ul><li>Goodwill = 800 + 200 − 1,100 = (100,000) gain → P&L</li></ul>\n<h3>5. IAS 27</h3><p>Separate FS: cost / IFRS 9 / equity method.</p>", "tip": "IFRS 10 = Control, IFRS 3 = Combinations, IFRS 13 = FV, IAS 27 = Separate FS."}, {"id": "12", "section": "B", "title": "Non-Controlling Interests (NCI)", "weight": "30%", "lesson": "<h3>1. Two NCI Methods</h3><table border=1 cellpadding=6><tr><th>Method</th><th>Formula</th><th>Effect</th></tr><tr><td>FV (Full Goodwill)</td><td>NCI shares × FV/share</td><td>Full goodwill</td></tr><tr><td>Proportionate</td><td>NCI% × FV Net Assets</td><td>Parent goodwill only</td></tr></table>\n<h3>2. Example</h3><p>P acquires 75% for Rs. 900,000. FV Net Assets Rs. 1,000,000. FV NCI Rs. 260,000.</p><ul><li>Method 1: Goodwill = 900 + 260 − 1,000 = Rs. 160,000</li><li>Method 2: NCI = 250,000; Goodwill = 900 + 250 − 1,000 = Rs. 150,000</li></ul>\n<h3>3. NCI at Reporting Date</h3><p><b>NCI(closing) = NCI(acq) + NCI share of post-acq profit − Div − URP(if S is seller)</b></p>\n<h3>4. Full Example</h3><p>Post-acq profit 400,000. Dividend 100,000. URP 40,000. NCI 25%.</p><ul><li>Share of profit = 100,000</li><li>Share of div = 25,000</li><li>Share of URP = 10,000</li><li><b>Closing NCI = 260 + 100 − 25 − 10 = Rs. 325,000</b></li></ul>", "tip": "NCI method affects only goodwill/NCI, not group RE."}, {"id": "13", "section": "B", "title": "Acquisition of Subsidiary During Period", "weight": "30%", "lesson": "<h3>1. Pre vs Post</h3><ul><li>Pre-acq: part of net assets → goodwill</li><li>Post-acq: group reserves + NCI</li></ul>\n<h3>2. Time Apportion</h3><p>Split by months if profits accrue evenly.</p>\n<h3>3. Example</h3><p>S annual profit Rs. 900,000. P acquired 80% on 1-May. YE 31-Dec.</p><ul><li>Pre-acq (4m): Rs. 300,000 → goodwill</li><li>Post-acq (8m): Rs. 600,000</li><li>NCI = 20% × 600,000 = Rs. 120,000</li></ul>\n<h3>4. Step Acquisition</h3><p>P had 15% (cost 200,000, FV 250,000 at control). Buys 45% for 750,000.</p><ul><li>Cost of combination = 250 + 750 = 1,000,000</li><li>Gain on remeasurement = 250 − 200 = Rs. 50,000 → P&L</li></ul>", "tip": "Split pre/post. Remeasure previous holding to FV on step."}, {"id": "14", "section": "B", "title": "Consolidated Statement of Changes in Equity", "weight": "30%", "lesson": "<h3>1. Purpose</h3><p>Shows movements in equity — separate parent and NCI columns.</p>\n<h3>2. Rows</h3><ul><li>Opening balance</li><li>Profit</li><li>OCI</li><li>Dividends</li><li>Share issues</li><li>Acq/disposal effects</li><li>Closing</li></ul>\n<h3>3. NCI Example</h3><p>Opening NCI Rs. 300,000. NCI PAT Rs. 80,000. Div Rs. 20,000. OCI Rs. 10,000.</p><ul><li>Closing = 300 + 80 + 10 − 20 = Rs. 370,000</li></ul>", "tip": "SOCIE reconciles opening to closing for each equity component."}, {"id": "15", "section": "B", "title": "Associates & Joint Ventures", "weight": "30%", "lesson": "<h3>1. Associate (IAS 28)</h3><p>Significant influence — 20-50%.</p>\n<h3>2. Equity Method</h3><p><b>Carrying = Cost + Share of profit − Share of div − Impairment</b></p>\n<h3>3. Example</h3><p>Cost 500,000 for 30% associate. Profit 250,000. Div 60,000. Impairment 15,000.</p><ul><li>Share profit = 75,000 (P&L)</li><li>Share div = 18,000</li><li>Closing = 500 + 75 − 18 − 15 = Rs. 542,000</li></ul>\n<h3>4. IFRS 11</h3><ul><li>Joint operation: proportionate share of A/L/R/E</li><li>Joint venture: equity method</li></ul>", "tip": "Associate = Cost + Profit share − Dividends − Impairment."}, {"id": "16", "section": "C", "title": "Changes in Group Structures", "weight": "20%", "lesson": "<h3>1. Three Scenarios</h3><ul><li>Control gained</li><li>Control retained</li><li>Control lost</li></ul>\n<h3>2. Control Retained — Buy from NCI</h3><p>P owns 70%, buys 10% for 150,000. NCI CA of 10% = 130,000.</p><ul><li>Diff = 20,000 → equity adjustment</li><li>No goodwill/P&L</li></ul>\n<h3>3. Control Lost — Full Disposal</h3><p>Sale 2,000,000. Net assets 1,500,000. Goodwill 200,000. NCI 300,000.</p><ul><li>Gain = 2,000 + 300 − 1,500 − 200 = Rs. 600,000</li></ul>\n<h3>4. Partial Disposal</h3><ul><li>Derecognize all sub assets/liabs/goodwill/NCI</li><li>Retained interest at FV</li><li>Gain to P&L</li></ul>", "tip": "Control lost → P&L. Control retained → Equity only."}, {"id": "17", "section": "C", "title": "Complex Group Structures", "weight": "20%", "lesson": "<h3>1. Vertical (Sub-sub)</h3><p>P → 80% S → 70% T.</p>\n<h3>2. Effective Ownership</h3><p>P effective in T = 80% × 70% = 56%. But T is fully consolidated.</p>\n<h3>3. NCI in Sub-Sub</h3><p>T net assets 2,000,000.</p><ul><li>Direct NCI = 30% × 2,000,000 = 600,000</li><li>Indirect NCI = 20% × 70% × 2,000,000 = 280,000</li><li>Total NCI in T = Rs. 880,000</li></ul>\n<h3>4. D-Shaped</h3><p>P owns 60% of T directly + 80% of S which owns 25% of T. Total = 60% + (80% × 25%) = 80%.</p>", "tip": "Draw group tree. Effective ownership ≠ Control."}, {"id": "18", "section": "C", "title": "Foreign Currency — IAS 21", "weight": "20%", "lesson": "<h3>1. Definitions</h3><ul><li>Functional currency</li><li>Presentation currency</li><li>Foreign operation</li></ul>\n<h3>2. Individual Entity Rates</h3><table border=1 cellpadding=6><tr><th>Item</th><th>Rate</th><th>Diff</th></tr><tr><td>Initial</td><td>Spot</td><td>—</td></tr><tr><td>Monetary YE</td><td>Closing</td><td>P&L</td></tr><tr><td>Non-monetary historical</td><td>Historical</td><td>None</td></tr><tr><td>Non-monetary FV</td><td>Valuation date</td><td>FV treatment</td></tr></table>\n<h3>3. Example</h3><p>Buy USD 20,000 inventory on 1-Oct at Rs. 280. YE rate Rs. 285.</p><ul><li>Initial payable = 5,600,000</li><li>YE = 5,700,000</li><li>Exchange loss Rs. 100,000 → P&L</li></ul>\n<h3>4. Foreign Subsidiary</h3><ul><li>Assets/Liabs → Closing rate</li><li>Equity → Historical</li><li>Income/Expense → Average</li><li>Exchange diff → OCI (translation reserve)</li></ul>", "tip": "Monetary → Closing → P&L. Foreign operation → OCI."}, {"id": "19", "section": "C", "title": "Group Statement of Cash Flows", "weight": "20%", "lesson": "<h3>1. Structure (IAS 7)</h3><ul><li>Operating (indirect/direct)</li><li>Investing</li><li>Financing</li></ul>\n<h3>2. Group Adjustments</h3><ul><li>Cash for acq NET of cash acquired → Investing</li><li>Dividends to NCI → Financing</li><li>Share of associate profit non-cash → Add back</li><li>Dividends from associate → Investing</li></ul>\n<h3>3. Acquisition Example</h3><p>Consideration 3,000,000. Cash with sub 400,000.</p><ul><li>Net outflow = Rs. 2,600,000</li></ul>\n<h3>4. Working Capital</h3><p>Receivables up 500,000, of which 200,000 acquired with sub.</p><ul><li>True operating = 300,000 outflow</li></ul>", "tip": "Adjust WC for acquisitions/disposals."}, {"id": "20", "section": "D", "title": "Financial Statements of Specialized Companies", "weight": "20%", "lesson": "<h3>1. SMEs</h3><ul><li>Simplified standards</li><li>Goodwill amortized (max 10 yrs)</li></ul>\n<h3>2. Banks</h3><ul><li>Net interest income</li><li>Loans/advances = assets</li><li>Deposits = liabilities</li><li>IFRS 9 ECL</li></ul>\n<p>Example: Interest income Rs. 3,500,000 − Interest paid Rs. 2,100,000 = Rs. 1,400,000</p>\n<h3>3. Insurance (IFRS 17)</h3><ul><li>Premium income</li><li>Unearned premium reserve</li><li>Claims incurred</li></ul>\n<h3>4. Mutual Funds</h3><ul><li>Net assets attributable to unit holders</li><li>NAV per unit</li></ul>", "tip": "Understand business model first."}, {"id": "21", "section": "D", "title": "International Public Sector Accounting Standards", "weight": "20%", "lesson": "<h3>1. Purpose</h3><p>Transparency & accountability in public sector.</p>\n<h3>2. Two Bases</h3><ul><li>Accrual: when transactions occur</li><li>Cash: when cash flows</li></ul>\n<h3>3. IPSAS 1</h3><ul><li>Statement of Financial Position</li><li>Performance</li><li>Changes in Net Assets</li><li>Cash Flow</li><li>Notes + Budget comparison</li></ul>\n<h3>4. Example</h3><p>Grant Rs. 500,000 for 2 years. Rs. 300,000 spent Y1.</p><ul><li>Accrual: Revenue Rs. 250,000 in Y1</li><li>Cash: Rs. 500,000 inflow Y1</li></ul>", "tip": "Accrual basis dominates modern IPSAS."}, {"id": "22", "section": "D", "title": "Advancement in Non-Financial Reporting", "weight": "20%", "lesson": "<h3>1. Management Commentary</h3><p>Narrative on results, strategy, risks, prospects.</p>\n<h3>2. Climate Reporting</h3><ul><li>TCFD: Governance, Strategy, Risk, Metrics/Targets</li><li>IFRS S1 & S2</li><li>Physical vs Transition risk</li></ul>\n<h3>3. Example</h3><p>Emissions 5,000 tCO2e. Revenue Rs. 800m.</p><ul><li>Carbon intensity = 6.25 tCO2e/Rs. m</li></ul>\n<h3>4. Sustainability</h3><ul><li>Economic/Environmental/Social</li><li>GRI Standards</li><li>ESG metrics</li></ul>\n<h3>5. HR Accounting</h3><ul><li>Investment in people</li><li>Historical vs replacement cost</li></ul>", "tip": "Non-financial = long-term value + ESG + stakeholder trust."}], "mcqs": {"1": [["Company A sold a machine for Rs. 500,000 with mandatory repurchase at Rs. 560,000 in 12 months. Substance:", ["Sale + gain", "Loan Rs. 500,000 + finance cost Rs. 60,000", "Operating lease", "No entry"], 1, "Loan = cash received 500,000. Finance cost = 560,000 − 500,000 = Rs. 60,000.", "Easy"], ["Goods costing Rs. 100,000 consigned with 10% commission and full return right. When to recognize revenue?", ["On dispatch", "When customer buys goods", "Month-end", "On payment"], 1, "Risks/rewards stay with principal until final sale.", "Easy"], ["Receivables Rs. 1,000,000 factored to bank for Rs. 900,000 with full recourse:", ["Derecognize + loss", "Loan Rs. 900,000 + finance cost Rs. 100,000", "Revenue Rs. 900,000", "No entry"], 1, "With recourse: no derecognition. Loan liability + finance cost.", "Medium"], ["Sale and leaseback: sold Rs. 2,000,000 (CA 1,500,000), leased 5 years, substantial benefits retained:", ["Sale + operating lease", "Financing arrangement", "Bargain purchase", "Impairment"], 1, "Retained substantial rights → financing.", "Hard"], ["Which best shows substance over form?", ["Revenue on invoice", "Repurchase agreement as loan", "Depreciation", "Accruals"], 1, "Classic textbook example.", "Easy"], ["SPE holds receivables of X. X has no legal ownership but receives all cash flows/risks:", ["Consolidate SPE", "Ignore SPE", "Available-for-sale", "Associate"], 0, "X controls in substance → consolidate.", "Medium"], ["Machine sold Rs. 800,000, repurchase Rs. 920,000 in 18 months. Monthly finance cost:", ["Rs. 6,667", "Rs. 15,000", "Rs. 76,667", "Rs. 51,111"], 0, "120,000 / 18 = Rs. 6,667.", "Medium"], ["Sale + deep-in-money call option. Substance:", ["Sale", "Lease", "Financing", "Nothing"], 2, "Certain repurchase = financing.", "Hard"]], "2": [["Bond Rs. 950,000, EIR 10%, coupon Rs. 60,000. Closing amortised cost:", ["Rs. 1,010,000", "Rs. 985,000", "Rs. 1,000,000", "Rs. 890,000"], 1, "950,000 + 95,000 − 60,000 = Rs. 985,000.", "Medium"], ["Held to collect + SPPI passes → measurement:", ["FVTPL", "FVOCI", "Amortised cost", "Cost"], 2, "Standard rule.", "Easy"], ["Stage 2 impairment triggered by:", ["Credit impaired", "Significant increase in credit risk", "No change", "Trading"], 1, "SICR = Stage 2 = Lifetime ECL.", "Medium"], ["Mandatory conversion into fixed shares (no cash obligation):", ["Liability", "Equity", "Compound", "FVTPL"], 1, "No cash obligation → equity.", "Hard"], ["Loan Rs. 2,000,000, EIR 8%, cash Rs. 100,000. Interest income:", ["Rs. 160,000", "Rs. 100,000", "R function findTopic(tid){ return DATA.topics.find(t => t.id === tid); }
function shuffle(a){ const arr=[...a]; for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function filterByDiff(qs, diff){ if(!diff||diff==='All') return qs; return qs.filter(q => q[4]===diff); }

function renderNav(){
    let h = '';
    let total=0, done=0;
    DATA.topics.forEach(t => { total++; if(state.completed[t.id]) done++; });
    const pct = total>0 ? Math.round(done/total*100) : 0;
    h += `<div style='padding:12px;background:var(--accent);border-radius:10px;margin-bottom:10px'><b>📊 Progress:</b> ${done}/${total} (${pct}%)<div class='progress'><div class='bar' style='width:${pct}%'></div></div></div>`;
    h += `<button class='navbtn special' onclick='navClick(()=>showDashboard())'>📊 Dashboard</button>`;
    h += `<button class='navbtn special' onclick='navClick(()=>showMatching())'>🔀 Matching Exercises</button>`;
    h += `<button class='navbtn special' onclick='navClick(()=>showCaseStudies())'>📚 Case Studies</button>`;
    DATA.sections.forEach(s => {
        h += `<div class='section-title'>${s.title} (${s.weight})</div>`;
        s.topic_ids.forEach(tid => {
            const t = findTopic(tid);
            const cls = state.completed[tid] ? 'done' : '';
            h += `<button class='navbtn ${cls}' onclick='navClick(()=>showTopic("${tid}"))'>${state.completed[tid]?'✓ ':''}${tid}. ${t.title}</button>`;
        });
        h += `<button class='navbtn section-test' onclick='navClick(()=>startSectionTest("${s.id}"))'>▶ Section ${s.id} Test</button>`;
    });
    h += `<div class='section-title'>Final</div>`;
    h += `<button class='navbtn special' onclick='navClick(()=>startFinalExam())'>🏆 Full Mock Exam</button>`;
    h += `<button class='navbtn' onclick='navClick(()=>showHome())'>🏠 Home</button>`;
    h += `<button class='navbtn' onclick='resetProgress()'>🔄 Reset All Progress</button>`;
    document.getElementById('sidebar').innerHTML = h;
}

function setDiff(btn, d){ document.querySelectorAll('.diff-selector button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedDiff = d; }
function markComplete(tid){ state.completed[tid]=true; saveState(); renderNav(); showTopic(tid); }

function showTopic(tid){
    const t = findTopic(tid);
    const section = DATA.sections.find(s => s.topic_ids.includes(tid));
    const availQs = (DATA.mcqs[tid]||[]).length;
    document.getElementById('main').innerHTML = `
        <span class='badge'>${section.title}</span><span class='badge purple'>Weight: ${section.weight}</span>
        <h2>${t.id}. ${t.title}</h2>
        <div class='card lesson'>${t.lesson}<div class='tip'><b>💡 Exam Tip:</b> ${t.tip}</div></div>
        <div class='card'>
            <h3>🎯 Practice This Topic</h3>
            <p><b>Available Questions:</b> ${availQs}. Choose difficulty:</p>
            <div class='diff-selector'>
                <button onclick='setDiff(this,"All")' class='active'>All</button>
                <button onclick='setDiff(this,"Easy")'>🟢 Easy</button>
                <button onclick='setDiff(this,"Medium")'>🟡 Medium</button>
                <button onclick='setDiff(this,"Hard")'>🔴 Hard</button>
            </div>
            <div class='actions'>
                <button class='act primary' onclick='startTopicQuiz("${tid}")'>▶ Start MCQs</button>
                <button class='act success' onclick='markComplete("${tid}")'>✓ Mark Complete</button>
            </div>
        </div>`;
}

function startTopicQuiz(tid){
    const all = DATA.mcqs[tid] || [];
    let qs = filterByDiff(all, selectedDiff);
    if(qs.length === 0) qs = all;
    quiz = { type:'topic', id:tid, title:findTopic(tid).title, questions:qs, idx:0, answers:new Array(qs.length).fill(null) };
    showQuestion();
}
function startSectionTest(sid){
    const section = DATA.sections.find(s => s.id === sid);
    let all = [];
    section.topic_ids.forEach(tid => { 
        const topicQs = (DATA.mcqs[tid]||[]).map(q => [...q, tid]);
        all = all.concat(shuffle(topicQs).slice(0, Math.max(2, Math.ceil(15/section.topic_ids.length))));
    });
    all = shuffle(all);
    quiz = { type:'section', id:sid, title:'Section '+sid+' Test', questions:all, idx:0, answers:new Array(all.length).fill(null) };
    showQuestion();
}
function startFinalExam(){
    let all = [];
    Object.keys(DATA.mcqs).forEach(tid => {
        const qs = shuffle((DATA.mcqs[tid]||[]).map(q => [...q, tid])).slice(0, 2);
        all = all.concat(qs);
    });
    all = shuffle(all);
    quiz = { type:'final', id:'final', title:'🏆 Full Mock AFACR Exam', questions:all, idx:0, answers:new Array(all.length).fill(null) };
    showQuestion();
}

function showQuestion(){
    const q = quiz.questions[quiz.idx];
    const isBookmarked = state.bookmarks.some(b => b.q === q[0]);
    const answered = quiz.answers[quiz.idx];
    const score = quiz.answers.filter(a => a && a.correct).length;
    const attempted = quiz.answers.filter(a => a).length;

    let palette = '';
    quiz.questions.forEach((qq, i) => {
        const a = quiz.answers[i];
        let cls = 'qnum';
        if(i === quiz.idx) cls += ' current';
        if(a){ cls += ' answered'; cls += a.correct ? ' correct' : ' incorrect'; }
        palette += `<div class='${cls}' onclick='goToQ(${i})'>${i+1}</div>`;
    });

    let optsHtml = '';
    q[1].forEach((o, i) => {
        let cls = 'option';
        let disabled = '';
        if(answered){
            disabled = 'disabled';
            if(i === q[2]) cls += ' correct';
            if(i === answered.selected && answered.selected !== q[2]) cls += ' incorrect';
        }
        optsHtml += `<button class='${cls}' ${disabled} onclick='selectOption(${i})'>${String.fromCharCode(65+i)}. ${o}</button>`;
    });

    let fbHtml = '';
    if(answered){
        fbHtml = answered.correct
            ? `<div class='feedback good'><b>✓ Correct!</b><div class='working'><b>Working:</b><br>${q[3]}</div></div>`
            : `<div class='feedback bad'><b>✗ Incorrect.</b> Correct: <b>${String.fromCharCode(65+q[2])}. ${q[1][q[2]]}</b><div class='working'><b>Working:</b><br>${q[3]}</div></div>`;
    }

    document.getElementById('main').innerHTML = `
        <h2>${quiz.title}</h2>
        <div class='qmeta'>
            <span class='badge'>Q ${quiz.idx+1}/${quiz.questions.length}</span>
            <span class='badge success'>Score: ${score}/${attempted}</span>
            <span class='badge'>${q[4]||'Medium'}</span>
            <button class='bookmark-btn ${isBookmarked?"on":""}' onclick='toggleBookmark()'>⭐ ${isBookmarked?"Saved":"Save"}</button>
        </div>
        <div class='card'>
            <h3>Question Palette</h3>
            <div class='legend'>
                <div class='legend-item'><div class='legend-swatch' style='background:var(--card)'></div>Not Answered</div>
                <div class='legend-item'><div class='legend-swatch' style='background:var(--success-bg);border-color:var(--success)'></div>Correct</div>
                <div class='legend-item'><div class='legend-swatch' style='background:var(--danger-bg);border-color:var(--danger)'></div>Incorrect</div>
                <div class='legend-item'><div class='legend-swatch' style='background:var(--primary)'></div>Current</div>
            </div>
            <div class='qpalette'>${palette}</div>
        </div>
        <div class='card'>
            <div class='lesson'><b>${q[0]}</b></div>
            <div id='opts'>${optsHtml}</div>
            ${fbHtml}
            <div class='qnav'>
                <div class='qnav-left'>
                    <button class='act secondary' onclick='previousQ()' ${quiz.idx===0?'disabled':''}>← Prev</button>
                </div>
                <div class='qnav-right'>
                    <button class='act warning' onclick='abortQuiz()'>Exit</button>
                    <button class='act primary' onclick='nextQ()' ${quiz.idx===quiz.questions.length-1?'disabled':''}>Next →</button>
                    <button class='act success' onclick='finishQuiz()'>🏁 Finish</button>
                </div>
            </div>
        </div>`;
    window.scrollTo(0,0);
}

function selectOption(i){
    if(quiz.answers[quiz.idx]) return;
    const q = quiz.questions[quiz.idx];
    quiz.answers[quiz.idx] = { selected: i, correct: (i === q[2]) };
    saveState();
    showQuestion();
}
function goToQ(i){ quiz.idx = i; showQuestion(); }
function previousQ(){ if(quiz.idx > 0){ quiz.idx--; showQuestion(); } }
function nextQ(){ if(quiz.idx < quiz.questions.length - 1){ quiz.idx++; showQuestion(); } }
function abortQuiz(){ if(confirm('Exit quiz without saving?')){ showHome(); } }
function finishQuiz(){ 
    const unanswered = quiz.answers.filter(a => !a).length;
    if(unanswered > 0){ if(!confirm(`${unanswered} unanswered. Finish anyway?`)) return; }
    showResult();
}
function toggleBookmark(){
    const q = quiz.questions[quiz.idx];
    const idx = state.bookmarks.findIndex(b => b.q === q[0]);
    if(idx >= 0) state.bookmarks.splice(idx, 1);
    else state.bookmarks.push({ q: q[0], options: q[1], answer: q[2], working: q[3], topic: q[5]||quiz.id });
    saveState();
    showQuestion();
}

function showResult(){
    const score = quiz.answers.filter(a => a && a.correct).length;
    const total = quiz.questions.length;
    const attempted = quiz.answers.filter(a => a).length;
    const pct = Math.round(score / total * 100);
    let msg = pct >= 80 ? '🎉 Excellent!' : pct >= 60 ? '👍 Good — revise weak areas.' : '📚 Needs work — revise the topics.';

    if(quiz.type === 'topic' && pct >= 60){ state.completed[quiz.id] = true; }
    state.scores[quiz.type+'_'+quiz.id+'_'+Date.now()] = { title: quiz.title, score, total, pct, date: Date.now() };
    saveState();

    let weakHtml = '';
    if(quiz.type === 'section' || quiz.type === 'final'){
        const topicScores = {};
        quiz.questions.forEach((q, i) => {
            const tid = q[5] || quiz.id;
            if(!topicScores[tid]) topicScores[tid] = { correct:0, total:0 };
            topicScores[tid].total++;
            if(quiz.answers[i] && quiz.answers[i].correct) topicScores[tid].correct++;
        });
        weakHtml = `<div class='card'><h3>📊 Weak Area Analysis</h3>`;
        Object.keys(topicScores).sort().forEach(tid => {
            const t = findTopic(tid);
            const tName = t ? `${tid}. ${t.title}` : tid;
            const ts = topicScores[tid];
            const tp = Math.round(ts.correct / ts.total * 100);
            const status = tp >= 80 ? '🟢' : tp >= 50 ? '🟡' : '🔴';
            weakHtml += `<div style='padding:10px;margin:6px 0;background:var(--accent);border-radius:8px'>${status} <b>${tName}</b> — ${ts.correct}/${ts.total} (${tp}%)</div>`;
        });
        weakHtml += `</div>`;
    }

    document.getElementById('main').innerHTML = `
        <h2>📋 Result — ${quiz.title}</h2>
        <div class='card gradient'>
            <div class='dashboard-card' style='background:rgba(255,255,255,0.2)'><div class='stat-num' style='color:white'>${score}/${total}</div><div class='stat-label' style='color:white'>Correct</div></div>
            <div class='dashboard-card' style='background:rgba(255,255,255,0.2)'><div class='stat-num' style='color:white'>${pct}%</div><div class='stat-label' style='color:white'>Percentage</div></div>
            <div class='dashboard-card' style='background:rgba(255,255,255,0.2)'><div class='stat-num' style='color:white'>${attempted}/${total}</div><div class='stat-label' style='color:white'>Attempted</div></div>
            <div class='dashboard-card' style='background:rgba(255,255,255,0.2)'><div class='stat-num' style='color:white'>${total-attempted}</div><div class='stat-label' style='color:white'>Skipped</div></div>
            <p style='margin-top:16px'>${msg}</p>
        </div>
        ${weakHtml}
        <div class='actions'>
            <button class='act primary' onclick='showHome()'>🏠 Home</button>
            <button class='act secondary' onclick='showDashboard()'>📊 Dashboard</button>
            <button class='act success' onclick='reviewQuiz()'>👁 Review</button>
        </div>`;
    renderNav();
}
function reviewQuiz(){ quiz.idx = 0; showQuestion(); }

function showDashboard(){
    const total = DATA.topics.length;
    const done = Object.keys(state.completed).length;
    const totalMcqs = Object.values(DATA.mcqs).reduce((s,a)=>s+a.length,0);
    let scoresHtml = '';
    const scoresList = Object.entries(state.scores).sort((a,b) => b[1].date - a[1].date).slice(0,10);
    scoresList.forEach(([k, sc]) => {
        const color = sc.pct >= 80 ? 'var(--success)' : sc.pct >= 60 ? 'var(--tip-border)' : 'var(--danger)';
        const date = new Date(sc.date).toLocaleString();
        scoresHtml += `<div style='padding:12px;margin:6px 0;background:var(--accent);border-radius:8px;border-left:4px solid ${color}'><b>${sc.title}</b><br>${sc.score}/${sc.total} (${sc.pct}%)<br><small style='opacity:0.7'>${date}</small></div>`;
    });
    if(!scoresHtml) scoresHtml = '<p style="opacity:0.7"><i>No tests yet.</i></p>';
    let topicHtml = '';
    DATA.sections.forEach(s => {
        const doneInSec = s.topic_ids.filter(id => state.completed[id]).length;
        const pct = Math.round(doneInSec / s.topic_ids.length * 100);
        topicHtml += `<div style='margin:10px 0'><b>${s.title}</b><br><small>${doneInSec}/${s.topic_ids.length}</small><div class='progress'><div class='bar' style='width:${pct}%'></div></div></div>`;
    });
    document.getElementById('main').innerHTML = `
        <h2>📊 Dashboard</h2>
        <div class='card'>
            <div class='dashboard-card'><div class='stat-num'>${done}/${total}</div><div class='stat-label'>Topics Done</div></div>
            <div class='dashboard-card'><div class='stat-num'>${state.bookmarks.length}</div><div class='stat-label'>Bookmarks</div></div>
            <div class='dashboard-card'><div class='stat-num'>${totalMcqs}</div><div class='stat-label'>Total MCQs</div></div>
            <div class='dashboard-card'><div class='stat-num'>${Object.keys(state.scores).length}</div><div class='stat-label'>Tests Taken</div></div>
        </div>
        <div class='card'>
            <h3>Section Completion</h3>
            ${topicHtml}
        </div>
        <div class='card'>
            <h3>Recent Scores</h3>
            ${scoresHtml}
        </div>`;
}

function showFormulas(){
    let h = `<h2>📐 AFACR Formula Cheat Sheet</h2><div class='card'>`;
    DATA.formulas.forEach(f => { h += `<div style='padding:12px;border-bottom:1px solid var(--border)'><b style='color:var(--primary)'>${f[0]}</b><br><span style='font-family:monospace;background:var(--accent);padding:6px 10px;border-radius:6px;display:inline-block;margin-top:6px;word-break:break-word'>${f[1]}</span></div>`; });
    h += `</div>`;
    document.getElementById('modalBody').innerHTML = h;
    document.getElementById('modal').classList.add('on');
}
function showBookmarks(){
    let h = `<h2>⭐ Bookmarked Questions</h2>`;
    if(state.bookmarks.length === 0){
        h += `<div class='card'><p><i>No bookmarks yet. Click ⭐ Save on any question during a quiz.</i></p></div>`;
    } else {
        state.bookmarks.forEach((b, i) => {
            const t = findTopic(b.topic);
            h += `<div class='card'><b>Q${i+1}: ${b.q}</b><br><small>Topic: ${t?t.title:b.topic}</small><br>`;
            b.options.forEach((o, j) => { const mark = j===b.answer?' ✓':''; const style = j===b.answer?'background:var(--success-bg);border-left:3px solid var(--success)':''; h += `<div style='padding:8px;margin:4px 0;border-radius:6px;${style}'>${String.fromCharCode(65+j)}. ${o}${mark}</div>`; });
            h += `<div class='working'><b>Working:</b><br>${b.working}</div>`;
            h += `<button class='act danger' style='margin-top:10px' onclick='removeBookmark(${i});showBookmarks()'>Remove</button></div>`;
        });
    }
    document.getElementById('modalBody').innerHTML = h;
    document.getElementById('modal').classList.add('on');
}
function removeBookmark(i){ state.bookmarks.splice(i,1); saveState(); }

function showCaseStudies(){
    let h = `<h2>📚 Case Studies</h2><div class='card'><p>Multi-part exam-style scenarios.</p></div>`;
    DATA.case_studies.forEach(cs => {
        h += `<div class='card'><h3>${cs.title}</h3><p>${cs.questions.length} sub-questions</p><button class='act primary' onclick='startCaseStudy("${cs.id}")'>▶ Start</button></div>`;
    });
    document.getElementById('main').innerHTML = h;
}
function startCaseStudy(csid){
    const cs = DATA.case_studies.find(c => c.id === csid);
    quiz = { type:'case', id:csid, title:cs.title, questions:cs.questions, idx:0, answers:new Array(cs.questions.length).fill(null), scenario:cs.scenario };
    showCaseQuestion();
}
function showCaseQuestion(){
    const q = quiz.questions[quiz.idx];
    const answered = quiz.answers[quiz.idx];
    const score = quiz.answers.filter(a => a && a.correct).length;
    const attempted = quiz.answers.filter(a => a).length;
    let palette = '';
    quiz.questions.forEach((qq, i) => {
        const a = quiz.answers[i];
        let cls = 'qnum';
        if(i === quiz.idx) cls += ' current';
        if(a){ cls += ' answered'; cls += a.correct ? ' correct' : ' incorrect'; }
        palette += `<div class='${cls}' onclick='goToCaseQ(${i})'>${i+1}</div>`;
    });
    let optsHtml = '';
    q[1].forEach((o, i) => {
        let cls = 'option'; let disabled = '';
        if(answered){ disabled = 'disabled'; if(i === q[2]) cls += ' correct'; if(i === answered.selected && answered.selected !== q[2]) cls += ' incorrect'; }
        optsHtml += `<button class='${cls}' ${disabled} onclick='selectCaseOption(${i})'>${String.fromCharCode(65+i)}. ${o}</button>`;
    });
    let fbHtml = '';
    if(answered){
        fbHtml = answered.correct
            ? `<div class='feedback good'><b>✓ Correct!</b><div class='working'><b>Working:</b><br>${q[3]}</div></div>`
            : `<div class='feedback bad'><b>✗ Incorrect.</b> Correct: <b>${String.fromCharCode(65+q[2])}. ${q[1][q[2]]}</b><div class='working'><b>Working:</b><br>${q[3]}</div></div>`;
    }
    document.getElementById('main').innerHTML = `
        <h2>${quiz.title}</h2>
        <div class='card lesson'><h3>📖 Scenario</h3>${quiz.scenario}</div>
        <div class='qmeta'>
            <span class='badge'>Sub-Q ${quiz.idx+1}/${quiz.questions.length}</span>
            <span class='badge success'>Score: ${score}/${attempted}</span>
        </div>
        <div class='card'>
            <h3>Question Palette</h3>
            <div class='qpalette'>${palette}</div>
        </div>
        <div class='card'>
            <div class='lesson'><b>${q[0]}</b></div>
            <div id='opts'>${optsHtml}</div>
            ${fbHtml}
            <div class='qnav'>
                <div class='qnav-left'>
                    <button class='act secondary' onclick='prevCaseQ()' ${quiz.idx===0?'disabled':''}>← Prev</button>
                </div>
                <div class='qnav-right'>
                    <button class='act warning' onclick='abortQuiz()'>Exit</button>
                    <button class='act primary' onclick='nextCaseQ()' ${quiz.idx===quiz.questions.length-1?'disabled':''}>Next →</button>
                    <button class='act success' onclick='finishCaseQuiz()'>🏁 Finish</button>
                </div>
            </div>
        </div>`;
    window.scrollTo(0,0);
}
function selectCaseOption(i){ if(quiz.answers[quiz.idx]) return; const q = quiz.questions[quiz.idx]; quiz.answers[quiz.idx] = { selected: i, correct: (i === q[2]) }; saveState(); showCaseQuestion(); }
function goToCaseQ(i){ quiz.idx = i; showCaseQuestion(); }
function prevCaseQ(){ if(quiz.idx>0){ quiz.idx--; showCaseQuestion(); } }
function nextCaseQ(){ if(quiz.idx<quiz.questions.length-1){ quiz.idx++; showCaseQuestion(); } }
function finishCaseQuiz(){ const un = quiz.answers.filter(a => !a).length; if(un>0){ if(!confirm(`${un} unanswered. Finish?`)) return; } showResult(); }

// ========== MOBILE-FRIENDLY MATCHING (TAP-TO-MATCH) ==========
let currentMatching = null;
let matchState = {}; // slot index -> value
let selectedMatchItem = null; // currently selected item to place
function showMatching(){
    let h = `<h2>🔀 Matching Exercises</h2><div class='card'><p><b>How to use (mobile-friendly):</b><br>1. Tap an item on the right to select it (highlighted purple).<br>2. Tap a slot on the left to place it.<br>3. Tap a filled slot to clear it.</p></div>`;
    DATA.matching.forEach((m, i) => {
        h += `<div class='card'><h3>${m.title}</h3><p>${m.pairs.length} items</p><button class='act primary' onclick='startMatching(${i})'>▶ Start</button></div>`;
    });
    document.getElementById('main').innerHTML = h;
}
function startMatching(idx){
    currentMatching = DATA.matching[idx];
    matchState = {};
    selectedMatchItem = null;
    renderMatching();
}
function renderMatching(){
    const shuffled = currentMatching._shuffled = currentMatching._shuffled || shuffle(currentMatching.pairs.map(p => p[1]));
    let leftHtml = '', rightHtml = '';
    currentMatching.pairs.forEach((p, i) => {
        const placed = matchState[i];
        leftHtml += `<div style='padding:10px;background:var(--card);border-radius:8px;margin:8px 0;border:1px solid var(--border)'><b>${p[0]}</b><div class='match-slot' data-idx='${i}' onclick='slotClick(${i})'>${placed || 'Tap here to place selected item'}</div></div>`;
    });
    shuffled.forEach((item, i) => {
        const used = Object.values(matchState).includes(item);
        const isSel = selectedMatchItem === item;
        rightHtml += `<div class='match-item ${used?"used":""} ${isSel?"selected":""}' onclick='itemClick("${item.replace(/"/g,"&quot;")}")'>${item}</div>`;
    });
    document.getElementById('main').innerHTML = `
        <h2>${currentMatching.title}</h2>
        <div class='card'><p><b>Instructions:</b> Tap an item on right → then tap slot on left to place. Tap filled slot to clear.</p></div>
        <div class='matching-grid'>
            <div class='match-col'><h4>📌 Items</h4>${leftHtml}</div>
            <div class='match-col'><h4>🎯 Definitions</h4>${rightHtml}</div>
        </div>
        <div class='actions'>
            <button class='act primary' onclick='checkMatching()'>✓ Check Answers</button>
            <button class='act warning' onclick='clearMatching()'>🔄 Clear All</button>
            <button class='act secondary' onclick='showMatching()'>← Back</button>
        </div>`;
    window.scrollTo(0,0);
}
function itemClick(item){
    if(Object.values(matchState).includes(item)) return; // already placed
    selectedMatchItem = selectedMatchItem === item ? null : item;
    renderMatching();
}
function slotClick(idx){
    if(matchState[idx]){
        // Clear this slot
        delete matchState[idx];
        renderMatching();
        return;
    }
    if(selectedMatchItem){
        matchState[idx] = selectedMatchItem;
        selectedMatchItem = null;
        renderMatching();
    } else {
        alert('First tap an item from the right column to select it.');
    }
}
function clearMatching(){ matchState = {}; selectedMatchItem = null; renderMatching(); }
function checkMatching(){
    let correct = 0;
    let feedback = '<div style="margin-top:12px">';
    currentMatching.pairs.forEach((p, i) => {
        if(matchState[i] === p[1]) { correct++; feedback += `<div style='padding:8px;margin:4px 0;background:var(--success-bg);border-radius:6px'>✓ ${p[0]} → ${p[1]}</div>`; }
        else feedback += `<div style='padding:8px;margin:4px 0;background:var(--danger-bg);border-radius:6px'>✗ ${p[0]} → Correct: <b>${p[1]}</b>${matchState[i]?' | Your answer: '+matchState[i]:' | Not answered'}</div>`;
    });
    feedback += '</div>';
    const pct = Math.round(correct / currentMatching.pairs.length * 100);
    const msg = pct >= 80 ? '🎉 Excellent!' : pct >= 60 ? '👍 Good.' : '📚 Try again.';
    document.getElementById('main').innerHTML = `
        <h2>${currentMatching.title} — Result</h2>
        <div class='card gradient'>
            <div class='stat-num' style='color:white'>${correct}/${currentMatching.pairs.length} (${pct}%)</div>
            <p style='color:white;margin-top:8px'>${msg}</p>
        </div>
        <div class='card'><h3>Answers</h3>${feedback}</div>
        <div class='actions'>
            <button class='act primary' onclick='startMatching(DATA.matching.indexOf(currentMatching))'>🔄 Try Again</button>
            <button class='act secondary' onclick='showMatching()'>← Back</button>
        </div>`;
    delete currentMatching._shuffled;
}

function closeModal(){ document.getElementById('modal').classList.remove('on'); }
function resetProgress(){
    if(!confirm('Reset ALL progress, scores, and bookmarks?')) return;
    state = { completed:{}, bookmarks:[], scores:{} };
    saveState();
    renderNav();
    showHome();
}

renderNav();
showHome();
</script>
</body>
