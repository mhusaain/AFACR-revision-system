<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=5.0'>
<meta name='mobile-web-app-capable' content='yes'>
<meta name='apple-mobile-web-app-capable' content='yes'>
<title>AFACR Revision and Practice System</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--text:#1a1d23;--primary:#1e40af;--primary-dark:#1e3a8a;--accent:#dbeafe;--border:#e2e8f0;--tip-bg:#fef3c7;--tip-border:#f59e0b;--success:#10b981;--success-bg:#d1fae5;--danger:#ef4444;--danger-bg:#fee2e2;--sidebar-bg:#fff;--purple:#7c3aed;--purple-bg:#ede9fe;--gradient:linear-gradient(135deg,#1e40af 0%,#3b82f6 100%);--gold:#eab308;}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--primary:#60a5fa;--primary-dark:#3b82f6;--accent:#1e3a5f;--border:#334155;--tip-bg:#3f2e17;--success:#34d399;--success-bg:#064e3b;--danger:#f87171;--danger-bg:#7f1d1d;--sidebar-bg:#1e293b;--purple:#a78bfa;--purple-bg:#4c1d95;--gradient:linear-gradient(135deg,#1e3a8a 0%,#1e40af 100%);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{overflow-x:hidden;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);margin:0;color:var(--text);font-size:var(--font-size,15px);-webkit-text-size-adjust:100%;}
.icon svg{width:100%;height:100%;}
header{background:var(--gradient);color:#fff;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0;}
.hamburger{display:none;background:rgba(255,255,255,.2);border:none;color:#fff;width:44px;height:44px;border-radius:10px;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;}
.logo-icon{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-info{min-width:0;}
.header-info h1{margin:0;font-size:21px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-info .prepared{font-size:12px;opacity:.9;margin-top:3px;display:flex;align-items:center;gap:6px;}
.header-info .prepared a{color:#fef3c7;text-decoration:none;font-weight:600;}
.controls{display:flex;gap:6px;flex-wrap:wrap;}
.controls button{padding:9px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;font-size:13px;font-weight:600;min-height:40px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.controls button:hover{background:rgba(255,255,255,.25);}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;max-width:1450px;margin:20px auto;padding:0 18px;}
.sidebar{background:var(--sidebar-bg);border-radius:14px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);height:max-content;position:sticky;top:96px;max-height:calc(100vh - 116px);overflow-y:auto;}
.main{background:var(--card);border-radius:14px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08);min-height:500px;}
.section-title{font-weight:700;margin:16px 0 8px;color:var(--primary);font-size:12px;text-transform:uppercase;letter-spacing:.6px;padding:0 8px;}
.navbtn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;margin:5px 0;padding:11px 12px;border:1px solid var(--border);background:var(--card);border-radius:9px;cursor:pointer;font-size:13px;color:var(--text);font-weight:500;min-height:42px;transition:all .15s;}
.navbtn:hover{border-color:var(--primary);background:var(--accent);}
.navbtn.done{border-color:var(--success);background:var(--success-bg);font-weight:600;}
.navbtn.done .navcheck{color:var(--success);}
.navcheck{width:16px;height:16px;display:inline-flex;flex-shrink:0;}
.navbtn.section-test{background:var(--primary);color:#fff;font-weight:700;margin-top:6px;}
.navbtn.section-test:hover{background:var(--primary-dark);}
.navbtn.special{background:var(--purple);color:#fff;font-weight:700;}
.navbtn.special:hover{background:#6d28d9;}
.navbtn-content{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;}
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:var(--primary);padding:5px 11px;border-radius:20px;font-weight:600;font-size:12px;margin:3px 4px 3px 0;}
.badge.success{background:var(--success-bg);color:var(--success);}
.badge.purple{background:var(--purple-bg);color:var(--purple);}
h2{color:var(--primary);margin-top:0;font-weight:700;font-size:22px;display:flex;align-items:center;gap:10px;}
h3{color:var(--primary);margin-bottom:6px;font-weight:600;font-size:17px;}
.card{border:1px solid var(--border);background:var(--card);border-radius:12px;padding:18px;margin:14px 0;}
.card.gradient{background:var(--gradient);color:#fff;border:none;}
.card.gradient h2,.card.gradient h3{color:#fff;}
.lesson{line-height:1.7;word-wrap:break-word;font-size:15px;}
.lesson h3{margin:16px 0 8px;}
.lesson table{border-collapse:collapse;margin:12px 0;width:100%;font-size:13px;}
.lesson th,.lesson td{border:1px solid var(--border);padding:8px;text-align:left;}
.lesson th{background:var(--accent);color:var(--primary);font-weight:700;}
.lesson ul,.lesson ol{padding-left:24px;}
.tip{border-left:4px solid var(--tip-border);background:var(--tip-bg);padding:14px;border-radius:8px;margin-top:14px;display:flex;gap:10px;align-items:flex-start;}
.tip-icon{color:var(--tip-border);flex-shrink:0;}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
button.act{padding:12px 18px;border:0;border-radius:9px;font-weight:700;cursor:pointer;font-size:14px;min-height:44px;display:inline-flex;align-items:center;gap:8px;transition:all .15s;}
button.act:hover{transform:translateY(-1px);}
button.act:disabled{opacity:.5;cursor:not-allowed;}
.primary{background:var(--primary);color:#fff;}
.secondary{background:#64748b;color:#fff;}
.success{background:var(--success);color:#fff;}
.warning{background:#f59e0b;color:#fff;}
.danger{background:var(--danger);color:#fff;}
.option{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;padding:14px 16px;margin:10px 0;border:2px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-size:15px;color:var(--text);font-weight:500;min-height:54px;transition:all .15s;}
.option:hover:not(:disabled){background:var(--accent);border-color:var(--primary);}
.option.correct{background:var(--success-bg) !important;border-color:var(--success);font-weight:600;}
.option.incorrect{background:var(--danger-bg) !important;border-color:var(--danger);font-weight:600;}
.option-letter{width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;font-size:14px;}
.option.correct .option-letter{background:var(--success);color:#fff;}
.option.incorrect .option-letter{background:var(--danger);color:#fff;}
.option-text{flex:1;line-height:1.5;}
.feedback{padding:16px;border-radius:10px;margin-top:14px;display:none;line-height:1.6;}
.feedback.good{display:block;background:var(--success-bg);border:2px solid var(--success);}
.feedback.bad{display:block;background:var(--danger-bg);border:2px solid var(--danger);}
.feedback-header{display:flex;align-items:center;gap:8px;font-weight:700;margin-bottom:6px;font-size:16px;}
.working{background:var(--accent);border-left:4px solid var(--primary);padding:14px;border-radius:8px;margin-top:10px;font-size:14px;line-height:1.7;}
.working ul,.working ol{padding-left:22px;margin:8px 0;}
.working-title{font-weight:700;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.progress{height:10px;background:var(--border);border-radius:30px;overflow:hidden;margin:10px 0;}
.bar{height:100%;background:linear-gradient(90deg,var(--success),#22c55e);width:0%;transition:width .4s;}
.qmeta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;padding:12px 14px;background:var(--accent);border-radius:10px;}
.bookmark-btn{background:transparent;border:2px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;color:var(--text);font-weight:600;min-height:40px;display:inline-flex;align-items:center;gap:6px;}
.bookmark-btn.on{background:var(--gold);color:#78350f;border-color:var(--gold);}
.qpalette{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:6px;padding:12px;background:var(--accent);border-radius:10px;margin:10px 0;max-height:220px;overflow-y:auto;}
.qnum{padding:10px 4px;text-align:center;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;background:var(--card);border:2px solid var(--border);min-height:44px;display:flex;align-items:center;justify-content:center;}
.qnum:hover{transform:scale(1.05);border-color:var(--primary);}
.qnum.current{background:var(--primary);color:#fff;border-color:var(--primary-dark);}
.qnum.correct{background:var(--success-bg);border-color:var(--success);color:var(--success);}
.qnum.incorrect{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
.qnum.answered{border-width:3px;}
.qnav{display:flex;gap:8px;justify-content:space-between;margin-top:16px;align-items:center;flex-wrap:wrap;}
.qnav-left,.qnav-right{display:flex;gap:8px;flex-wrap:wrap;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:flex-start;justify-content:center;padding:15px;overflow-y:auto;}
.modal.on{display:flex;}
.modal-content{background:var(--card);border-radius:14px;padding:22px;max-width:750px;width:100%;max-height:90vh;overflow-y:auto;margin:auto;}
.close{float:right;cursor:pointer;background:var(--accent);border:none;padding:8px;border-radius:8px;color:var(--text);}
.dashboard-card{display:inline-block;width:calc(50% - 12px);margin:5px;padding:18px;background:var(--accent);border-radius:12px;vertical-align:top;}
.stat-num{font-size:28px;font-weight:800;color:var(--primary);}
.stat-label{font-size:13px;color:var(--text);opacity:.75;margin-top:4px;}
.diff-selector{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;}
.diff-selector button{padding:10px 16px;border:2px solid var(--border);background:var(--card);border-radius:9px;cursor:pointer;color:var(--text);font-weight:600;min-height:44px;}
.diff-selector button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.matching-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:15px 0;}
.match-col{background:var(--accent);padding:14px;border-radius:10px;}
.match-item{padding:12px;margin:8px 0;background:var(--card);border-radius:8px;cursor:pointer;border:2px solid var(--border);font-size:14px;font-weight:500;user-select:none;-webkit-user-select:none;}
.match-item.selected{background:var(--purple-bg);border-color:var(--purple);}
.match-item.used{opacity:.35;pointer-events:none;}
.match-slot{padding:12px;margin:8px 0;background:var(--card);border-radius:8px;border:2px dashed var(--border);min-height:46px;font-size:14px;cursor:pointer;}
.footer{text-align:center;padding:22px;color:var(--text);opacity:.65;font-size:13px;margin-top:20px;border-top:1px solid var(--border);}
.footer a{color:var(--primary);text-decoration:none;font-weight:600;}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;margin:8px 0;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-swatch{width:14px;height:14px;border-radius:3px;border:2px solid var(--border);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;}
.sidebar-overlay.on{display:block;}
@media(max-width:900px){
.hamburger{display:flex;}
.header-info h1{font-size:16px;}
.controls button span:not(.icon){display:none;}
.layout{grid-template-columns:1fr;padding:0 12px;margin:12px auto;gap:12px;}
.sidebar{position:fixed;left:-320px;top:0;height:100vh;max-height:100vh;width:300px;z-index:95;border-radius:0;transition:left .3s;padding-top:20px;}
.sidebar.open{left:0;}
.main{padding:16px;}
h2{font-size:18px;}
.lesson{font-size:14px;}
.dashboard-card{width:calc(100% - 10px);margin:5px 0;}
.matching-grid{grid-template-columns:1fr;}
.qnav-left,.qnav-right{width:100%;justify-content:stretch;}
.qnav button{flex:1;}
}
</style>
</head>
<body>
<header>
<div class='header-left'>
<button class='hamburger' onclick='toggleSidebar()' aria-label='Menu'><span class="icon" style="width:22px;height:22px;display:inline-flex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span></button>
<div class='logo-icon'><span class="icon" style="width:26px;height:26px;color:#fff"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span></div>
<div class='header-info'>
<h1>AFACR Revision and Practice</h1>
<div class='prepared'><span class='icon' style='width:14px;height:14px;display:inline-flex'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span> Prepared by <b>Muhammad Hussain</b> · <a href='mailto:ac.hussain07@gmail.com'>ac.hussain07@gmail.com</a></div>
</div>
</div>
<div class='controls'>
<button onclick='toggleTheme()'><span class='icon' style='width:14px;height:14px;display:inline-flex'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span><span>Theme</span></button>
<button onclick='changeFontSize(1)'><span class='icon' style='width:14px;height:14px;display:inline-flex'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></span><span>A+</span></button>
<button onclick='changeFontSize(-1)'>A−</button>
<button onclick='showFormulas()'><span class='icon' style='width:14px;height:14px;display:inline-flex'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/></svg></span><span>Formulas</span></button>
<button onclick='showBookmarks()'><span class='icon' style='width:14px;height:14px;display:inline-flex'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span><span>Bookmarks</span></button>
</div>
</header>
<div class='sidebar-overlay' id='sidebarOverlay' onclick='closeSidebar()'></div>
<div class='layout'>
<aside class='sidebar' id='sidebar'></aside>
<main class='main' id='main'></main>
</div>
<div class='modal' id='modal'>
<div class='modal-content'>
<button class='close' onclick='closeModal()'><span class='icon' style='width:20px;height:20px;display:inline-flex'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></button>
<div id='modalBody'></div>
</div>
</div>
<div class='footer'>© 2026 AFACR Revision and Practice System · Prepared by Muhammad Hussain · <a href='mailto:ac.hussain07@gmail.com'>ac.hussain07@gmail.com</a></div>
<script>
const DATA={"topics": [{"id": "1", "section": "A", "title": "Substance over Form", "weight": "30%", "lesson": "<h3>Chapter 1 — Substance over Form</h3>\n<p><b>IAS 1</b> requires financial statements to represent faithfully the transactions and reflect the <b>economic substance</b> of events, not merely their legal form.</p>\n<h3>Key Areas where Substance and Form May Differ</h3>\n<ul><li>Consignment inventory and goods on sale or return</li><li>Sale and repurchase agreements</li><li>Sale and leaseback agreements</li><li>Factoring of receivables</li></ul>\n<h3>ICMA Example — Hafeez Carmart (Consignment)</h3>\n<p>Hafeez Carmart obtains stock from ABC Limited on consignment. Price is set at delivery. Hafeez pays after selling to customer, but must purchase unsold cars after 6 months. No right of return. Hafeez insures and maintains cars.</p>\n<p><b>Analysis:</b> Dealer faces slow-movement risk, obligation to purchase, insurance and theft risk. Cars should be recognised on Hafeez's Statement of Financial Position at delivery.</p>\n<h3>ICMA Example — Zaviar/Pearl Limited (Sale and Repurchase)</h3>\n<p>Zaviar sells its head office (cost Rs. 10 million) to Pearl Limited for Rs. 10 million on 1 January. Zaviar has option to repurchase after 4 years at Rs. 12 million. Zaviar continues using, insuring and maintaining property. Head office valued at Rs. 18 million.</p>\n<p><b>Substance:</b> Secured loan with effective interest Rs. 2 million (Rs. 12m minus Rs. 10m) over 4 years. Zaviar continues to recognise head office as asset.</p>\n<h3>ICMA Example — Bright Limited (Sale and Leaseback)</h3>\n<p>Sold machinery Rs. 1,000,000 proceeds (carrying value Rs. 750,000). Leased back over 5-year finance lease. Annual rental Rs. 277,409. Implicit rate 12%.</p>\n<ul><li>Depreciation = Rs. 1,000,000 / 5 years = <b>Rs. 200,000</b></li><li>Year 1 finance charge = Rs. 1,000,000 × 12% = <b>Rs. 120,000</b></li><li>Profit on disposal Rs. 250,000 <b>deferred</b> over 5 years = Rs. 50,000 per year to Profit or Loss</li></ul>", "tip": "Ask: who bears risk, gets reward, holds control? Substance beats legal form."}, {"id": "2", "section": "A", "title": "Financial Instruments — IAS 32, IFRS 7 and IFRS 9", "weight": "30%", "lesson": "<h3>Chapter 2 — Financial Instruments</h3>\n<h3>IFRS 9 Classification (Two tests for Amortised Cost)</h3>\n<ol><li><b>Business Model Test:</b> Entity holds asset to collect contractual cash flows</li><li><b>Contractual Cash Flow (SPPI) Test:</b> Cash flows are solely payments of principal and interest</li></ol>\n<table border=1 cellpadding=6><tr><th>Business Model</th><th>SPPI</th><th>Measurement</th></tr><tr><td>Hold to collect</td><td>Pass</td><td>Amortised Cost</td></tr><tr><td>Hold to collect and sell</td><td>Pass</td><td>Fair Value through OCI</td></tr><tr><td>Trading or SPPI fails</td><td>—</td><td>Fair Value through Profit or Loss</td></tr></table>\n<h3>Default for Equity Investments</h3>\n<p>Default is <b>Fair Value through Profit or Loss</b>. Entity can make irrevocable election at initial recognition to use FVOCI (gains/losses never recycled).</p>\n<h3>Transaction Costs</h3>\n<ul><li><b>FVTPL:</b> Transaction costs expensed immediately</li><li><b>All others:</b> Transaction costs capitalised</li></ul>\n<h3>ICMA Example — Jamil Deep Discount Bond</h3>\n<p>Nominal Rs. 50,000. Discount 16%. Issue costs Rs. 2,000. Coupon 5%. Premium on redemption Rs. 4,611. Life 5 years. Effective rate 12%.</p>\n<ul><li>Initial recognition: Rs. 50,000 minus Rs. 8,000 minus Rs. 2,000 = <b>Rs. 40,000</b></li><li>Total finance cost = (54,611 + 12,500) minus 40,000 = <b>Rs. 27,111</b></li><li>Year 1: Opening 40,000 + Interest (40,000 × 12% = 4,800) − Coupon (2,500) = Closing <b>Rs. 42,300</b></li></ul>\n<h3>ICMA Example — E Limited Impairment</h3>\n<p>1 February 20X6: 4-year loan Rs. 10,000. Coupon 6% = Effective rate. Feb 20X9: F Limited in difficulty. Estimated future cash flow Rs. 6,000. Current market rate 8%.</p>\n<p><b>Recoverable</b> = Rs. 6,000 discounted at ORIGINAL effective rate 6% = 6,000 / 1.06 = <b>Rs. 5,660</b></p>\n<p><b>Impairment loss</b> = Rs. 10,000 minus Rs. 5,660 = <b>Rs. 4,340</b></p>", "tip": "Classification via Business Model + SPPI. Impairment uses ORIGINAL effective interest rate."}, {"id": "3", "section": "A", "title": "Employee Benefits — IAS 19", "weight": "30%", "lesson": "<h3>Chapter 3 — Employee Benefits</h3>\n<h3>Four Categories</h3>\n<ul><li>Short-term benefits (within 12 months)</li><li>Post-employment benefits (pensions)</li><li>Other long-term benefits</li><li>Termination benefits</li></ul>\n<h3>Defined Contribution vs Defined Benefit</h3>\n<table border=1 cellpadding=6><tr><th></th><th>Defined Contribution</th><th>Defined Benefit</th></tr><tr><td>Obligation</td><td>Fixed contribution</td><td>Promised benefit</td></tr><tr><td>Risk</td><td>Employee</td><td>Employer</td></tr></table>\n<h3>ICMA Example — Hamza Limited</h3>\n<p>1 January 20X4: Present Value of obligation Rs. 140 million, Fair Value of plan assets Rs. 80 million. Discount rate 4%. Service cost Rs. 30 million.</p>\n<p><b>Statement of Profit or Loss expense calculation:</b></p>\n<ul><li>Opening net obligation = Rs. 140m minus Rs. 80m = Rs. 60 million</li><li>Net interest = 4% × Rs. 60m = <b>Rs. 2.4 million</b></li><li>Service cost = Rs. 30 million</li><li><b>Total P&L expense = Rs. 30m + Rs. 2.4m = Rs. 32.4 million</b></li></ul>\n<h3>Presentation</h3>\n<ul><li>P&L: Service Cost + Net Interest</li><li>OCI: Remeasurements (never recycled)</li><li>Asset ceiling caps any surplus</li></ul>", "tip": "P&L = Service Cost + Net Interest on net obligation. OCI = Remeasurements (never recycled)."}, {"id": "4", "section": "A", "title": "Share-Based Payments — IFRS 2", "weight": "30%", "lesson": "<h3>Chapter 4 — Share-Based Payments</h3>\n<h3>Two Main Types</h3>\n<ul><li><b>Equity-settled:</b> Grant-date Fair Value. Not remeasured for market conditions.</li><li><b>Cash-settled (Share Appreciation Rights):</b> Remeasured to current Fair Value each period.</li></ul>\n<h3>ICMA Example — Alpha Directors Options</h3>\n<p>10 million options granted. 3-year vesting. Grant-date Fair Value 30 paisas.</p>\n<table border=1 cellpadding=4><tr><th>Year</th><th>Expected to vest</th></tr><tr><td>Year 1</td><td>7 million</td></tr><tr><td>Year 2</td><td>8 million</td></tr><tr><td>Year 3 (actual)</td><td>9 million</td></tr></table>\n<p><b>Uses GRANT-DATE Fair Value throughout:</b></p>\n<ul><li>Year 1: 7m × 30 paisas × 1/3 = <b>Rs. 700,000</b></li><li>Year 2: 8m × 30 paisas × 2/3 = Rs. 1,600,000 cumulative → expense Rs. 900,000</li><li>Year 3: 9m × 30 paisas × 3/3 = Rs. 2,700,000 cumulative → expense Rs. 1,100,000</li></ul>\n<h3>ICMA Example — Growler Share Appreciation Rights</h3>\n<p>500 employees × 200 Share Appreciation Rights on 1 January 20X4. 4-year vesting. Expected 20 leavers per year.</p>\n<p>Year 1 Fair Value Rs. 5. Liability = 420 employees × 200 rights × Rs. 5 × 1/4 = <b>Rs. 105,000</b></p>", "tip": "Equity-settled: Grant-date Fair Value. Cash-settled: current Fair Value each period."}, {"id": "5", "section": "A", "title": "Fair Value Measurement — IFRS 13", "weight": "30%", "lesson": "<h3>Chapter 5 — Fair Value Measurement</h3>\n<p><b>Fair Value</b> = Price to sell asset or transfer liability in orderly transaction between market participants at measurement date (EXIT price).</p>\n<h3>Fair Value Hierarchy</h3>\n<ul><li><b>Level 1:</b> Quoted prices in active markets for identical assets</li><li><b>Level 2:</b> Observable inputs other than Level 1</li><li><b>Level 3:</b> Unobservable inputs</li></ul>\n<h3>Market Selection Example</h3>\n<p>Asset in two markets. Market 1: price Rs. 26, transport Rs. 2, transaction Rs. 3 (net Rs. 21). Market 2: price Rs. 25, transport Rs. 2, transaction Rs. 1 (net Rs. 22).</p>\n<ul><li>If Market 1 is Principal: Fair value = Rs. 26 minus Rs. 2 transport = <b>Rs. 24</b> (transaction costs ignored)</li><li>If most advantageous: Market 2, Fair value = Rs. 25 minus Rs. 2 transport = <b>Rs. 23</b></li></ul>", "tip": "Fair Value = EXIT price. Adjust for transport (feature of asset). Exclude transaction costs."}, {"id": "6", "section": "A", "title": "Other Financial Reporting Standards", "weight": "30%", "lesson": "<h3>Chapter 6 — Other Standards</h3>\n<h3>IFRS 6 — Exploration and Evaluation</h3>\n<p>Entity develops own accounting policy. Impairment tested at Cash Generating Unit level.</p>\n<h3>IFRS 14 — Regulatory Deferral Accounts</h3>\n<p><b>Only</b> for first-time IFRS adopters with rate-regulated activities.</p>\n<h3>IAS 26 — Retirement Benefit Plans</h3>\n<p>Financial statements of the PLAN ITSELF (not employer).</p>\n<h3>IAS 29 — Hyperinflationary Economies</h3>\n<p>Threshold: 3-year cumulative inflation ≥ 100%. Non-monetary items restated using price index.</p>\n<p><b>Example:</b> Asset at index 100 for Rs. 800,000. Current index 300. Restated = Rs. 800,000 × 300/100 = <b>Rs. 2,400,000</b></p>\n<h3>IAS 34 — Interim Reporting</h3>\n<p>Same accounting policies as annual. Materiality based on interim period data.</p>", "tip": "IAS 29 threshold = 100% over 3 years. IFRS 14 only for first-time IFRS adopters."}, {"id": "7", "section": "B", "title": "Introduction to Group Accounting", "weight": "30%", "lesson": "<h3>Chapter 7 — Introduction to Group Accounting</h3>\n<h3>IFRS 10 Control (ALL THREE required)</h3>\n<ol><li>Power over the investee</li><li>Exposure to variable returns</li><li>Ability to use power to affect returns</li></ol>\n<h3>Exemption from Consolidation</h3>\n<p>All conditions must be met:</p>\n<ul><li>Parent is wholly or partially-owned subsidiary itself</li><li>Debt/equity not publicly traded</li><li>Not filed with securities commission</li><li>Ultimate parent produces IFRS-compliant consolidated statements</li></ul>\n<h3>Non-coterminous Year Ends</h3>\n<p>Maximum gap 3 months with adjustments for significant transactions.</p>", "tip": "Control requires ALL THREE elements. Draw group structure diagram first."}, {"id": "8", "section": "B", "title": "Consolidated Statement of Financial Position", "weight": "30%", "lesson": "<h3>Chapter 8 — CSOFP</h3>\n<h3>Five Standard Workings</h3>\n<ol><li>(W1) Group structure diagram</li><li>(W2) Net assets at acquisition and reporting date</li><li>(W3) Goodwill</li><li>(W4) Non-controlling interest</li><li>(W5) Group retained earnings</li></ol>\n<h3>Goodwill Formula</h3>\n<p><b>Goodwill = Consideration + NCI at acquisition + Fair Value of previous holding MINUS Fair Value of Net Assets</b></p>\n<h3>NCI Methods</h3>\n<ul><li><b>Fair Value (Full):</b> NCI × Fair Value per share → Full goodwill</li><li><b>Proportionate:</b> NCI% × Fair Value net assets → Parent's goodwill only</li></ul>\n<h3>ICMA Example — Ahmad Hassan/Asar</h3>\n<p>Ahmad Hassan acquired 70% of Rs. 100m equity of Asar for Rs. 200m on 1 January 20X9. Asar retained earnings at acquisition Rs. 156m. NCI at fair value Rs. 82.8m. Goodwill impaired 50%. At 31 December 20X9: Ahmad Hassan retained earnings Rs. 275m; Asar Rs. 177m.</p>\n<p><b>Goodwill:</b> Rs. 200m + Rs. 82.8m minus Rs. 256m = <b>Rs. 26.8 million</b></p>\n<p><b>Group RE:</b> Rs. 275m + 70% × Rs. 21m − 70% × Rs. 13.4m = <b>Rs. 280.32 million</b></p>", "tip": "Goodwill = What paid + NCI at acquisition minus Fair Value of Net Assets."}, {"id": "9", "section": "B", "title": "Consolidated Statement of Comprehensive Income", "weight": "30%", "lesson": "<h3>Chapter 9 — CSCI</h3>\n<h3>Rules</h3>\n<ul><li>Include subsidiary from acquisition date only (time-apportion mid-year)</li><li>Add 100% subsidiary revenue and expenses</li><li>Eliminate intra-group sales, dividends, interest</li><li>Adjust for unrealised profit in inventory</li><li>Allocate profit between Parent and NCI</li></ul>\n<h3>Example — Mid-Year Acquisition</h3>\n<p>Parent acquired 75% of Subsidiary on 1 April. Subsidiary revenue Rs. 1,600,000, expenses Rs. 1,200,000 (evenly accrued). Year end 31 December.</p>\n<ul><li>Post-acquisition (9 months): Revenue Rs. 1,200,000; Expenses Rs. 900,000; Profit Rs. 300,000</li><li>NCI share = 25% × Rs. 300,000 = <b>Rs. 75,000</b></li></ul>\n<h3>Unrealised Profit</h3>\n<p>Parent sells to Subsidiary Rs. 200,000 at 25% markup on cost. Subsidiary holds Rs. 60,000.</p>\n<p>Margin = 25/125 = 20%. URP = Rs. 60,000 × 20% = <b>Rs. 12,000</b></p>", "tip": "Time-apportion mid-year acquisitions. Eliminate ALL intra-group items."}, {"id": "10", "section": "B", "title": "Associates and Joint Ventures — IAS 28", "weight": "30%", "lesson": "<h3>Chapter 10 — Associates</h3>\n<h3>Definition</h3>\n<p>Entity over which investor has <b>significant influence</b> (usually 20-50% voting power).</p>\n<h3>Equity Method</h3>\n<p><b>Investment = Cost + Share of post-acquisition profits MINUS dividends MINUS impairment</b></p>\n<h3>ICMA Example — Fahad/Mahad</h3>\n<p>Fahad bought 30% of Mahad on 1 July 20X4 (mid-year). Mahad profit for year Rs. 400m. Impairment Rs. 10m.</p>\n<ul><li>Share of profit (6 months): 30% × Rs. 400m × 6/12 = Rs. 60m</li><li>Less impairment: Rs. 10m</li><li><b>Share of profit from associate = Rs. 50 million</b></li></ul>\n<h3>Unrealised Profit</h3>\n<p>Only take GROUP SHARE of URP (not full amount).</p>", "tip": "Associate = Cost + Post-acq profits − Dividends − Impairment. URP × group %."}, {"id": "11", "section": "C", "title": "Changes in Group Structure", "weight": "20%", "lesson": "<h3>Chapter 11 — Changes in Group Structure</h3>\n<h3>Three Scenarios</h3>\n<ul><li><b>Control gained (Step Acquisition):</b> Remeasure previous holding to Fair Value, gain/loss to P&L</li><li><b>Control retained:</b> Equity transaction only — no goodwill adjustment</li><li><b>Control lost:</b> Gain/loss to P&L</li></ul>\n<h3>Formula for Loss of Control</h3>\n<p><b>Gain = Proceeds + Fair Value of retained interest + NCI at disposal MINUS Net Assets MINUS Unimpaired Goodwill</b></p>", "tip": "Control lost → P&L. Control retained → Equity transaction only."}, {"id": "12", "section": "C", "title": "Complex Group Structures", "weight": "20%", "lesson": "<h3>Chapter 12 — Complex Groups</h3>\n<h3>Vertical Group</h3>\n<p>Parent → Subsidiary → Sub-subsidiary. Effective ownership = Parent % × Subsidiary %</p>\n<h3>Example</h3>\n<p>Parent owns 80% of Subsidiary. Subsidiary owns 60% of Sub-subsidiary. Parent's effective interest = 48%. Total NCI in Sub-subsidiary = 52% (40% direct + 12% indirect).</p>", "tip": "Draw group tree. Effective ownership = product. Later of two acquisition dates."}, {"id": "13", "section": "C", "title": "Foreign Currency — IAS 21", "weight": "20%", "lesson": "<h3>Chapter 13 — Foreign Currency</h3>\n<h3>Translation Rates</h3>\n<table border=1 cellpadding=4><tr><th>Item</th><th>Rate</th><th>Difference</th></tr><tr><td>Monetary items at year end</td><td>Closing rate</td><td>Profit or Loss</td></tr><tr><td>Non-monetary at cost</td><td>Historical rate</td><td>None</td></tr><tr><td>Foreign sub Assets/Liabilities</td><td>Closing rate</td><td>OCI</td></tr><tr><td>Foreign sub Income/Expenses</td><td>Average rate</td><td>OCI</td></tr></table>\n<h3>ICMA Example — Star Limited</h3>\n<p>Star Limited (functional currency Pakistan Rupee) bought goods from Morgan for £80,000 on 19 December 20X9. Rate £1 = Rs. 186. Year end: £1 = Rs. 182. Paid 3 February 20X0: £1 = Rs. 188.</p>\n<ul><li>Purchases recorded: £80,000 × 186 = <b>Rs. 14,880,000</b></li><li>Payable at year end: £80,000 × 182 = <b>Rs. 14,560,000</b></li><li>Exchange gain in 20X9: <b>Rs. 320,000</b></li><li>Exchange loss on settlement: <b>Rs. 480,000</b></li></ul>", "tip": "Monetary → Closing rate → P&L. Foreign operation → OCI."}, {"id": "14", "section": "C", "title": "Group Statement of Cash Flows", "weight": "20%", "lesson": "<h3>Chapter 14 — Group Cash Flows</h3>\n<h3>Group-Specific Adjustments</h3>\n<ul><li>Cash for acquisition NET of cash acquired → Investing</li><li>Dividends to NCI → Financing</li><li>Share of associate profit (non-cash) → Add back</li><li>Dividend from associate → Investing</li></ul>\n<h3>Example</h3>\n<p>Consideration Rs. 5 million. Cash acquired with subsidiary Rs. 700,000.</p>\n<p><b>Net cash outflow = Rs. 5m minus Rs. 700k = Rs. 4.3 million</b> (investing activity)</p>", "tip": "Net cash for acquisitions. Dividends to NCI = financing."}, {"id": "15", "section": "A", "title": "Earnings Per Share — IAS 33", "weight": "30%", "lesson": "<h3>Chapter 15 — EPS</h3>\n<h3>Basic EPS Formula</h3>\n<p><b>Basic EPS = (Profit After Tax MINUS Preference Dividend) DIVIDED BY Weighted Average Ordinary Shares</b></p>\n<h3>Bonus Issue (Retrospective)</h3>\n<p>12 million shares. 1-for-4 bonus issue. New total = 15 million (used for BOTH years).</p>\n<h3>Rights Issue Example</h3>\n<p>Cum-rights price Rs. 2.00. Rights price Rs. 1.50. 1-for-5.</p>\n<p>TERP = (5 × Rs. 2.00 + Rs. 1.50) / 6 = <b>Rs. 1.92</b></p>\n<h3>Diluted EPS</h3>\n<ul><li>Convertible bonds: Add back post-tax interest saved</li><li>Options: Only in-the-money are dilutive</li></ul>", "tip": "Bonus = retrospective. Rights = use TERP. Diluted only if reduces EPS."}, {"id": "16", "section": "A", "title": "Operating Segments — IFRS 8", "weight": "NEW", "lesson": "<h3>Chapter 16 — Operating Segments</h3>\n<h3>Definition</h3>\n<p>Component of entity that: (1) engages in business activities earning revenues, (2) results regularly reviewed by Chief Operating Decision Maker, (3) discrete financial information available.</p>\n<h3>Scope</h3>\n<p>IFRS 8 applies to <b>LISTED COMPANIES ONLY</b> (voluntary for others).</p>\n<h3>10% Threshold</h3>\n<p>Segment reportable if it meets ANY of:</p>\n<ul><li>Revenue ≥ 10% of total revenue</li><li>Profit/loss ≥ 10% of greater of total profits or losses</li><li>Assets ≥ 10% of total assets</li></ul>\n<h3>75% Rule</h3>\n<p>External revenue of reportable segments must be at least 75% of entity's total.</p>", "tip": "IFRS 8 = listed only. 10% threshold. 75% coverage rule."}, {"id": "17", "section": "A", "title": "Ratio Analysis", "weight": "NEW", "lesson": "<h3>Chapter 17 — Ratio Analysis</h3>\n<h3>Liquidity Ratios</h3>\n<ul><li><b>Current Ratio</b> = Current Assets / Current Liabilities</li><li><b>Quick (Acid Test)</b> = (Current Assets − Inventory) / Current Liabilities</li></ul>\n<h3>Working Capital Cycle</h3>\n<p><b>Cycle = Inventory Days + Receivables Days − Payables Days</b></p>\n<h3>Example — Huda Limited</h3>\n<p>Sales Rs. 900,000; COGS Rs. 756,000; Receivables Rs. 112,500; Payables Rs. 75,600; Purchases Rs. 504,000; Inventory Rs. 333,000.</p>\n<ul><li>Inventory Days: 333,000/756,000 × 365 = 160.8 days</li><li>Receivables Days: 112,500/900,000 × 365 = 45.6 days</li><li>Payables Days: 75,600/504,000 × 365 = 54.8 days</li><li><b>Cycle = 160.8 + 45.6 − 54.8 = 151.6 days ≈ 152 days</b></li></ul>\n<h3>Profitability</h3>\n<ul><li>ROCE = PBIT / Capital Employed</li><li>Gearing = Debt / (Debt + Equity)</li></ul>", "tip": "Working Capital Cycle: Inventory + Receivables − Payables (all in days)."}, {"id": "18", "section": "D", "title": "Non-Financial Reporting", "weight": "20%", "lesson": "<h3>Chapter 18 — Non-Financial Reporting</h3>\n<h3>Management Commentary (IFRS PS 1)</h3>\n<p>Narrative report — nature of business, objectives, strategies, risks, prospects, KPIs.</p>\n<h3>IFRS S1 and S2 (Sustainability)</h3>\n<p>Effective 1 January 2024. Four TCFD pillars: <b>Governance, Strategy, Risk Management, Metrics and Targets</b>.</p>\n<h3>Climate Risks</h3>\n<ul><li><b>Physical:</b> Extreme weather</li><li><b>Transition:</b> Policy/regulatory changes</li></ul>\n<h3>GHG Emissions</h3>\n<ul><li>Scope 1: Direct</li><li>Scope 2: Purchased energy</li><li>Scope 3: Value chain</li></ul>", "tip": "TCFD 4 pillars. Physical vs Transition risks."}, {"id": "19", "section": "D", "title": "IPSAS", "weight": "20%", "lesson": "<h3>Chapter 19 — IPSAS</h3>\n<p>International Public Sector Accounting Standards for public sector entities.</p>\n<h3>Two Bases</h3>\n<ul><li><b>Accrual basis:</b> When transactions occur</li><li><b>Cash basis:</b> When cash flows</li></ul>\n<h3>IPSAS 1 Required Statements</h3>\n<ul><li>Statement of Financial Position</li><li>Statement of Financial Performance</li><li>Statement of Changes in Net Assets/Equity</li><li>Cash Flow Statement</li><li>Budget comparison (if applicable)</li></ul>\n<p>Timeliness: within 6 months of reporting date.</p>", "tip": "Accrual dominates. 6-month timeliness."}, {"id": "20", "section": "D", "title": "Specialized Companies", "weight": "20%", "lesson": "<h3>Chapter 20 — Specialized Companies</h3>\n<h3>IFRS for SMEs</h3>\n<ul><li>Goodwill AMORTISED (10 years default)</li><li>All R&D expensed</li><li>Cost model only for PPE</li></ul>\n<h3>Banks</h3>\n<p><b>Net Interest Income = Interest Earned − Interest Expensed</b></p>\n<h3>Insurance</h3>\n<p><b>Claims Incurred = Claims Paid + Change in Outstanding Reserve</b></p>\n<h3>Mutual Funds</h3>\n<p><b>NAV per unit = (Total Assets − Total Liabilities) / Units Outstanding</b></p>", "tip": "SMEs: amortise goodwill. Banks: NII. Insurance: earned premium + claims incurred."}], "mcqs": {"1": [["Hafeez Carmart, a car dealer, obtains stock from ABC Limited on consignment basis. Purchase price is set at delivery. Hafeez pays after selling to customer, but must purchase unsold cars after six months. No right of return. Hafeez is responsible for insurance and maintenance from delivery. How should Hafeez account for the cars?", ["Not recognised until final sale to customer", "Recognised on Hafeez's Statement of Financial Position at delivery", "Recognised on ABC Limited's Statement of Financial Position", "Split 50/50 between the two entities"], 1, "<b>Substance analysis:</b><ul><li>Dealer faces slow-movement risk (must buy unsold after 6 months)</li><li>Dealer insures and maintains cars</li><li>Dealer faces theft risk</li><li>No right of return</li></ul><b>Conclusion:</b> All risks and rewards lie with Hafeez. Cars are recognised as inventory on Hafeez's Statement of Financial Position at the date of delivery.", "Medium"], ["Zaviar sells its head office (cost Rs. 10 million) to Pearl Limited for Rs. 10 million on 1 January, with option to repurchase after four years at Rs. 12 million. Head office valued at Rs. 18 million. Zaviar continues to use, insure and maintain the property. How should Zaviar record this?", ["As a genuine sale with gain of Rs. 8 million", "As a secured loan with finance cost of Rs. 2 million over 4 years", "As an operating lease", "No transaction — related party"], 1, "<b>Analysis:</b><ul><li>Zaviar retains benefits of use, insurance, maintenance</li><li>Repurchase price Rs. 12m exceeds sale price Rs. 10m by Rs. 2m (effective interest)</li><li>Property valued at Rs. 18m — well above sale price, so Zaviar will repurchase</li></ul><b>Substance:</b> Secured loan with effective interest of Rs. 2 million over 4 years. Head office continues on Zaviar's Statement of Financial Position.", "Hard"], ["Bright Limited sold machinery Rs. 1,000,000 (carrying value Rs. 750,000) and leased back over 5-year finance lease. Annual rental Rs. 277,409. Implicit rate 12%. What is the finance charge in Year 1?", ["Rs. 90,000", "Rs. 150,000", "Rs. 120,000", "Rs. 277,409"], 2, "<b>Step-by-step:</b><ul><li>Opening liability = Rs. 1,000,000</li><li>Finance charge Year 1 = Rs. 1,000,000 × 12% = <b>Rs. 120,000</b></li><li>Closing liability = Rs. 1,000,000 + Rs. 120,000 − Rs. 277,409 = Rs. 842,591</li></ul>", "Medium"], ["Continuing Bright Limited example: profit on disposal Rs. 250,000 should be:", ["Recognised immediately in Year 1 profit", "Credited to Retained Earnings directly", "Deferred over 5 years (Rs. 50,000 per year)", "Netted against depreciation"], 2, "<b>Sale and Finance Leaseback rule:</b> Profit on disposal is DEFERRED over the lease term.<ul><li>Total profit: Rs. 250,000</li><li>Released to profit each year: Rs. 50,000</li></ul>Journal at sale:<br>Debit Bank Rs. 1,000,000; Credit Asset Rs. 750,000; Credit Deferred Income Rs. 250,000", "Medium"], ["An entity factors Rs. 12 million receivables. Factor pays 80% immediately. Any unpaid after 4 months returns to entity at book value. 1% per month charged on amount owing. What is the substance?", ["Genuine sale of receivables", "Loan on security of receivables with finance cost", "Split — 80% sale, 20% loan", "No transaction"], 1, "<b>Analysis:</b><ul><li>Entity retains bad debt risk (unpaid returns to entity)</li><li>Entity retains slow-payment risk</li><li>1% per month charge = effective interest</li></ul><b>Substance:</b> Loan on security of receivables. Recognise loan liability Rs. 9.6 million (80% × Rs. 12m) and finance cost accrual.", "Hard"], ["Substance over form is required by which standard?", ["IFRS 9", "IFRS 15", "IAS 1 (faithful representation)", "IAS 16"], 2, "IAS 1 requires financial statements to represent faithfully the transactions carried out and reflect economic substance, not merely legal form.", "Easy"], ["An entity sold building for Rs. 500,000 with mandatory repurchase at Rs. 560,000 in 12 months. Effective monthly finance cost is:", ["Rs. 5,000", "Rs. 6,667", "Rs. 60,000", "Rs. 46,667"], 0, "<b>Calculation:</b><ul><li>Total finance cost = Rs. 560,000 − Rs. 500,000 = Rs. 60,000</li><li>Monthly = Rs. 60,000 / 12 = <b>Rs. 5,000</b></li></ul>", "Medium"], ["Which is the BEST indicator that a transaction is a disguised loan rather than a genuine sale?", ["Written contract exists", "Legal title has transferred", "Physical possession transferred", "Seller has option to repurchase at higher price"], 3, "An option to repurchase at a price higher than sale proceeds indicates the seller receives cash now and repays a higher amount later — the essence of a financing arrangement.", "Medium"]], "2": [["For a debt investment to be measured at amortised cost under IFRS 9, it must pass which TWO tests?", ["Business Model Test and SPPI Test", "Fair Value Test and Business Model Test", "Purchase Agreement Test and SPPI Test", "Amortised Cost Test and Fair Value Test"], 0, "<b>Two tests for amortised cost:</b><ol><li>Business Model Test: Hold to collect contractual cash flows</li><li>SPPI Test: Solely Payments of Principal and Interest</li></ol>Both must be passed for amortised cost. Otherwise measurement is Fair Value.", "Easy"], ["The default classification for an equity investment under IFRS 9 is:", ["Amortised Cost", "Fair Value through Other Comprehensive Income", "Cost less impairment", "Fair Value through Profit or Loss"], 3, "Default for equity investments is <b>Fair Value through Profit or Loss</b>. Entity can make an irrevocable election at initial recognition to use FVOCI (gains/losses never recycled).", "Easy"], ["Diamond Limited purchased 10,000 shares on 1 September 2014 for Rs. 35 each, choosing the alternative treatment (FVOCI). Transaction costs Rs. 5,000. At 31 December 2014, shares trading at Rs. 45 each. What is the gain recognised?", ["Rs. 100,000", "Rs. 45,000", "Rs. 95,000", "Rs. 35,000"], 2, "<b>Step-by-step (FVOCI — capitalise transaction costs):</b><ul><li>Initial carrying value: 10,000 × Rs. 35 + Rs. 5,000 = Rs. 355,000</li><li>Year-end fair value: 10,000 × Rs. 45 = Rs. 450,000</li><li>Gain in OCI = Rs. 450,000 − Rs. 355,000 = <b>Rs. 95,000</b></li></ul>", "Medium"], ["Copper Limited purchased 15,000 shares for Rs. 65 each on 1 August 2016 for trading purposes. Transaction costs Rs. 15,000. At 30 September year-end, shares worth Rs. 77.5 each. Where is the gain recognised?", ["Rs. 172,500 in Other Comprehensive Income", "Rs. 172,500 in Profit or Loss", "Rs. 187,500 in Other Comprehensive Income", "Rs. 187,500 in Profit or Loss"], 3, "<b>Trading = Fair Value through Profit or Loss:</b><ul><li>Transaction costs EXPENSED (not capitalised)</li><li>Initial value: 15,000 × Rs. 65 = Rs. 975,000</li><li>Year-end value: 15,000 × Rs. 77.5 = Rs. 1,162,500</li><li>Gain to P&L: <b>Rs. 187,500</b></li></ul>", "Medium"], ["An entity issued Rs. 20 million 5% debenture with Rs. 500,000 issue costs. Effective rate 10%. Redeemed 3 years later at premium. Balance at end of Year 2?", ["Rs. 20,450,000", "Rs. 21,495,000", "Rs. 22,000,000", "Rs. 22,100,000"], 1, "<b>Amortised cost table:</b><br>Initial: Rs. 19,500,000<br>Year 1: 19,500,000 + 1,950,000 interest − 1,000,000 coupon = <b>Rs. 20,450,000</b><br>Year 2: 20,450,000 + 2,045,000 interest − 1,000,000 coupon = <b>Rs. 21,495,000</b>", "Hard"], ["Oxygen Limited purchased debt instrument for Rs. 500,000 (principal Rs. 550,000, 5-year maturity). Fixed interest 6%. Effective rate 8%. Balance at end of Year 2?", ["Rs. 550,000", "Rs. 507,000", "Rs. 520,800", "Rs. 514,560"], 3, "<b>Year 1:</b> 500,000 + (500,000 × 8%) − (550,000 × 6%) = 500,000 + 40,000 − 33,000 = <b>Rs. 507,000</b><br><b>Year 2:</b> 507,000 + (507,000 × 8%) − 33,000 = 507,000 + 40,560 − 33,000 = <b>Rs. 514,560</b>", "Hard"], ["Which is NOT a financial instrument under IAS 32?", ["Share options", "Redeemable preference shares", "Intangible assets (patents, brands)", "Trade receivables"], 2, "Intangible assets do not give rise to a present right to receive cash or another financial asset. They are covered by IAS 38, not IAS 32.", "Easy"], ["Iron Limited has Rs. 30 million 5% redeemable preference shares. How should shares and dividends be presented?", ["Equity; dividend in Statement of Changes in Equity", "Liability; dividend in Statement of Changes in Equity", "Equity; dividend in P&L", "Liability; dividend in Profit or Loss"], 3, "<b>IAS 32:</b> Redeemable preference shares create obligation to deliver cash → LIABILITY. 'Dividend' becomes FINANCE COST in Profit or Loss.", "Medium"]], "3": [["Which is TRUE about post-employment plan classification?", ["Defined Contribution: employer bears actuarial risk", "Multi-employer plan is always defined benefit", "Defined Benefit: employer promises specific benefit and bears risk", "In DC plans, employer's obligation is complex actuarial calculation"], 2, "<b>DC vs DB:</b><ul><li>DC: Employer pays fixed contribution. Employee bears investment risk. Simple accounting.</li><li>DB: Employer promises benefit. Employer bears actuarial risk. Complex accounting.</li></ul>", "Easy"], ["Hamza Limited at 1 January 20X4: PV obligation Rs. 140m, Fair Value plan assets Rs. 80m. Discount rate 4%. Service cost Rs. 30m. What is the P&L expense for 20X4?", ["Rs. 30 million", "Rs. 32.4 million", "Rs. 60 million", "Rs. 27.6 million"], 1, "<b>P&L = Service Cost + Net Interest:</b><ul><li>Net obligation opening: Rs. 140m − Rs. 80m = Rs. 60m</li><li>Net interest: 4% × Rs. 60m = Rs. 2.4m</li><li>Service cost: Rs. 30m</li><li><b>Total P&L expense = Rs. 32.4 million</b></li></ul>", "Medium"], ["An entity improves pension scheme, resulting in Rs. 10 million increase in liability. Average remaining service life 10 years. How is this treated?", ["Charged against Retained Earnings directly", "Charged against Profit or Loss immediately", "Spread over remaining service lives", "Not recognised"], 1, "IAS 19 (revised 2011): Past service costs recognised IMMEDIATELY in Profit or Loss. The old rule of spreading over vesting period was abolished.", "Medium"], ["Actuarial gains and losses on defined benefit plan under IAS 19 are recognised in:", ["Profit or Loss immediately", "Directly to Retained Earnings", "Profit or Loss over working lives", "Other Comprehensive Income (not recycled)"], 3, "Remeasurement components (including actuarial gains/losses) go to OCI and are NEVER RECYCLED to Profit or Loss.", "Easy"], ["Present Value of obligation Rs. 9 million; Fair Value of plan assets Rs. 7.2 million. Net defined benefit liability is:", ["Rs. 1.8 million", "Rs. 16.2 million", "Rs. 9 million", "Rs. 7.2 million"], 0, "Net liability = PV obligation − FV plan assets = Rs. 9m − Rs. 7.2m = <b>Rs. 1.8 million</b>", "Easy"], ["MJ Limited: Fair Value plan assets Rs. 3,100m; PV obligation Rs. 2,400m. Asset ceiling (future refunds/reductions) Rs. 200m. Net asset recognised?", ["Rs. 700 million (full surplus)", "Rs. 500 million", "Rs. 100 million", "Rs. 200 million"], 3, "<b>Asset Ceiling Rule:</b><ul><li>Calculated surplus = Rs. 3,100m − Rs. 2,400m = Rs. 700m</li><li>Asset ceiling = Rs. 200m</li><li>Recognised net asset = LOWER = <b>Rs. 200 million</b></li></ul>", "Hard"], ["Salary bill Rs. 5,000,000. DC scheme 8%. Annual expense is:", ["Rs. 40,000", "Rs. 4,600,000", "Rs. 400,000", "Rs. 800,000"], 2, "DC expense = Contribution rate × Salary = 8% × Rs. 5,000,000 = <b>Rs. 400,000</b>", "Easy"], ["Under revised IAS 19, the correct classification of pension components is:", ["All movements to Profit or Loss", "P&L: Service Cost + Net Interest; OCI: Remeasurements (not recycled)", "P&L: Service Cost only; OCI: everything else", "P&L: everything; OCI unused"], 1, "<b>IAS 19 (revised) three components:</b><ul><li>Service Cost → P&L</li><li>Net Interest → P&L</li><li>Remeasurements → OCI (never recycled)</li></ul>", "Medium"]], "4": [["Alpha Limited granted 10 million options with grant-date Fair Value 30 paisas. 3-year vesting. End of Year 1: 7 million expected to vest. Year 1 expense?", ["Rs. 300,000", "Rs. 900,000", "Rs. 1,000,000", "Rs. 700,000"], 3, "<b>Equity-settled — uses GRANT-DATE Fair Value:</b><ul><li>Expected vesting: 7m</li><li>Fair Value: 30 paisas</li><li>Vesting fraction: 1/3</li><li>Expense = 7m × 30p × 1/3 = <b>Rs. 700,000</b></li></ul>", "Medium"], ["Continuing Alpha Limited: end of Year 2, 8 million expected. Year 2 expense?", ["Rs. 1,600,000", "Rs. 900,000", "Rs. 700,000", "Rs. 800,000"], 1, "<b>Cumulative Year 2:</b> 8m × 30p × 2/3 = Rs. 1,600,000<br><b>Year 2 expense:</b> Rs. 1,600,000 − Rs. 700,000 = <b>Rs. 900,000</b>", "Medium"], ["Growler Limited granted 200 Share Appreciation Rights to each of 500 employees on 1 January 20X4. 4-year vesting. 20 employees expected to leave each year. Year 1 Fair Value Rs. 5. Year 1 liability?", ["Rs. 210,000", "Rs. 84,000", "Rs. 420,000", "Rs. 105,000"], 3, "<b>Cash-settled SARs — uses CURRENT Fair Value:</b><ul><li>Employees expected to vest: 500 − (4 × 20) = 420</li><li>Liability = 420 × 200 × Rs. 5 × 1/4 = <b>Rs. 105,000</b></li></ul>", "Hard"], ["Which distinguishes equity-settled from cash-settled share-based payments?", ["Both use grant-date Fair Value", "Cash-settled remeasured to current Fair Value each period", "Cash-settled creates equity reserve", "Both create liability"], 1, "<b>Key difference:</b><ul><li>Equity-settled: Grant-date FV ONLY, no remeasurement</li><li>Cash-settled: CURRENT FV, remeasured each period</li></ul>", "Easy"], ["A market condition (share price target) for share options affects:", ["Number expected to vest — adjust each period", "Fair value at grant date — no adjustment for failure", "Both fair value and vesting", "Neither — ignored"], 1, "Market conditions built into grant-date fair value. Do NOT adjust for failure. Non-market conditions (service, EPS): adjust vesting numbers.", "Medium"], ["100 employees each granted 500 options. Fair Value Rs. 10. 3-year vesting. Expected 90 to vest. Annual expense per year?", ["Rs. 150,000", "Rs. 450,000", "Rs. 500,000", "Rs. 166,667"], 0, "Total = 90 × 500 × Rs. 10 = Rs. 450,000. Annual = Rs. 450,000 / 3 = <b>Rs. 150,000</b>", "Easy"], ["A modification increasing fair value of equity options is treated as:", ["Ignored", "Additional expense over remaining vesting period", "Immediate expense", "New grant"], 1, "Incremental FV (new − original at date of modification) recognised as additional expense OVER REMAINING VESTING PERIOD.", "Medium"]], "5": [["Fair value under IFRS 13 is:", ["Historical cost less depreciation", "Amount for exchange in arm's length", "Price to sell asset in orderly transaction at measurement date (exit price)", "Replacement cost"], 2, "Fair value = EXIT PRICE in orderly transaction between market participants at measurement date. Not entry price, not historical cost.", "Easy"], ["Level 1 fair value inputs are:", ["Adjusted quoted prices", "Present value of future cash flows", "Unadjusted quoted prices in active markets for identical assets", "Management estimates"], 2, "Level 1: Unadjusted quoted prices in active markets for IDENTICAL assets — most reliable evidence of fair value.", "Easy"], ["Asset in Market A: price Rs. 30, transport Rs. 3, transaction Rs. 2. Market B: price Rs. 28, transport Rs. 3, transaction Rs. 1. If Market A is principal, fair value is:", ["Rs. 25", "Rs. 30", "Rs. 28", "Rs. 27"], 3, "<b>Principal Market rule:</b><ul><li>Use price in principal market: Rs. 30</li><li>Adjust for transport (feature of asset): −Rs. 3</li><li>Do NOT adjust for transaction costs</li><li>Fair Value = Rs. 30 − Rs. 3 = <b>Rs. 27</b></li></ul>", "Hard"], ["Highest and best use means:", ["Current use only", "Physically possible, legally permissible, financially feasible", "Buyer's intended use", "Only alternative that increases value"], 1, "Highest and best use = Physically possible + Legally permissible + Financially feasible. Current use is presumed unless evidence suggests otherwise.", "Medium"], ["Fair value of a liability includes:", ["Only benchmark interest rate", "Non-performance risk (including own credit risk)", "No credit risk adjustment", "Only contractual rate"], 1, "IFRS 13 requires including NON-PERFORMANCE RISK (own credit risk). Changes in credit risk affect fair value of liability.", "Medium"]], "6": [["IFRS 6 governs:", ["Investment property", "Exploration and evaluation of mineral resources", "Business combinations", "Employee benefits"], 1, "IFRS 6: Exploration and Evaluation of Mineral Resources. Own accounting policies allowed. Impairment tested at CGU level.", "Easy"], ["Under IAS 29, hyperinflation is indicated when:", ["Annual inflation exceeds 20%", "3-year cumulative inflation approaches or exceeds 100%", "Government declares emergency", "Exchange rate depreciates 50%"], 1, "IAS 29 threshold: cumulative inflation over 3 years approaching or exceeding 100%.", "Medium"], ["Asset at index 100 for Rs. 800,000. Current index 300. Restated per IAS 29:", ["Rs. 800,000 (monetary)", "Rs. 266,667", "Rs. 1,200,000", "Rs. 2,400,000"], 3, "Restated = Rs. 800,000 × (300/100) = <b>Rs. 2,400,000</b>. Non-monetary items restated using price index.", "Hard"], ["IFRS 14 applies to:", ["All entities", "Only first-time IFRS adopters with rate-regulated activities", "All utilities", "SMEs"], 1, "IFRS 14 is INTERIM standard for first-time IFRS adopters with regulatory deferral balances under previous GAAP.", "Medium"], ["IAS 26 governs:", ["Employer accounting for pensions", "Financial statements of the retirement benefit plan itself", "Multi-employer plans", "Termination benefits"], 1, "IAS 26 addresses accounting BY retirement benefit plans (the plan as reporting entity), NOT the employer. IAS 19 covers employer.", "Medium"]], "7": [["Under IFRS 10, control exists when investor has:", ["More than 50% voting shares only", "Board representation", "Power + Variable Returns Exposure + Ability to Affect Returns", "Legal ownership through purchase"], 2, "IFRS 10 requires ALL THREE: (1) Power, (2) Variable returns, (3) Ability to affect returns. Ownership percentage not explicitly required.", "Medium"], ["Chemist Limited owns 100% of the following. In which circumstance would investment NOT be consolidated?", ["Alpha: loss-making, being sold", "Beta: bank with different activities", "Delta: local standards incompatible with IFRS", "Gamma: military coup — control lost"], 3, "<b>Only valid reason:</b> Loss of control. Loss-making, different activities, and local GAAP conflicts are NOT valid reasons for exclusion.", "Medium"], ["Parent need not prepare consolidated statements if ALL EXCEPT:", ["Wholly or partially-owned subsidiary itself", "Debt/equity not publicly traded", "Different activities from parent", "Ultimate parent produces IFRS statements available publicly"], 2, "Activities of subsidiaries are NEVER a valid reason for exemption. All other three conditions must be met.", "Medium"], ["High Limited has 18% shareholding, board seat, provides management expertise. The investee is:", ["Subsidiary (control)", "Associate (significant influence)", "Financial asset only", "Joint venture"], 1, "Even below 20%, significant influence CAN exist through board representation and management involvement. Result: Associate (equity method).", "Hard"]], "8": [["Ahmad Hassan Limited acquired 70% of Rs. 100m equity of Asar for Rs. 200m on 1 January 20X9. Asar retained earnings Rs. 156m. NCI at fair value Rs. 82.8m. Goodwill impaired 50%. Ahmad Hassan retained earnings Rs. 275m at year end; Asar Rs. 177m. Group Retained Earnings?", ["Rs. 289.7 million", "Rs. 280.32 million", "Rs. 276.3 million", "Rs. 269.2 million"], 1, "<b>Step-by-step:</b><ul><li>Goodwill: 200m + 82.8m − 256m = Rs. 26.8m</li><li>Impairment: 50% × 26.8m = Rs. 13.4m</li><li>Ahmad Hassan: Rs. 275m</li><li>+ 70% × Asar post-acq (177 − 156): Rs. 14.7m</li><li>− 70% × Impairment: Rs. 9.38m</li><li><b>Total = Rs. 280.32 million</b></li></ul>", "Hard"], ["Big Limited acquired 70% of Small Limited's 10 million Rs. 10 shares for Rs. 800m. Small's retained earnings Rs. 570m, revaluation surplus Rs. 150m. NCI at fair value Rs. 220m. Goodwill?", ["Rs. 100 million", "Rs. 300 million", "Rs. 150 million", "Rs. 200 million"], 3, "<b>Goodwill = Consideration + NCI − FV Net Assets</b><br>Net assets: Rs. 100m SC + Rs. 570m RE + Rs. 150m Rev = Rs. 820m<br>Goodwill = 800 + 220 − 820 = <b>Rs. 200 million</b>", "Medium"], ["Sunshine Limited acquired 80% of Sun Flower Limited on 1 January 2011. Deferred consideration Rs. 200m payable on 1 January 2014. Cost of capital 10%. What is deferred consideration liability at 31 December 2012?", ["Rs. 150.262 million", "Rs. 165.288 million", "Rs. 200 million", "Rs. 181.818 million"], 3, "At 31 December 2012, one year until payment. PV = Rs. 200m / 1.10 = <b>Rs. 181.818 million</b>", "Hard"], ["Wareesha Limited has 80% subsidiary Irfan. Wareesha sold inventory to Irfan Rs. 21.6m at 20% markup on cost. All still held. Wareesha inventory Rs. 162m; Irfan Rs. 108m. Consolidated inventory?", ["Rs. 270 million", "Rs. 265.68 million", "Rs. 248.4 million", "Rs. 266.4 million"], 3, "URP = Rs. 21.6m × 20/120 = Rs. 3.6m<br>Consolidated inventory = Rs. 270m − Rs. 3.6m = <b>Rs. 266.4 million</b>", "Medium"], ["Parent sold Rs. 800,000 goods to 75% subsidiary at 25% markup on cost. 25% still in inventory. URP adjustment?", ["Rs. 32,000", "Rs. 160,000", "Rs. 40,000", "Rs. 200,000"], 2, "Total profit: Rs. 800,000 × 25/125 = Rs. 160,000<br>URP (25% remaining): Rs. 160,000 × 25% = <b>Rs. 40,000</b>", "Medium"], ["Python Limited acquired 75% of Snake Limited on 1 January 2011. Net assets Rs. 80m. NCI at fair value Rs. 40m. At 1 January 2013: net assets Rs. 120m; goodwill impaired Rs. 10m. NCI at 1 January 2013?", ["Rs. 40 million", "Rs. 87.5 million", "Rs. 50 million", "Rs. 47.5 million"], 3, "NCI = 40 + 25%×(120−80) − 25%×10 = 40 + 10 − 2.5 = <b>Rs. 47.5 million</b>", "Hard"], ["P Limited transferred plant to S Limited on 1 January 2013 for Rs. 30m. Plant originally cost Rs. 30m on 1 January 2011 (10-year life, unchanged). URP at 31 December 2013?", ["Rs. 12 million", "Rs. 5.4 million", "Rs. 9 million", "Rs. 5.25 million"], 3, "<b>Step-by-step:</b><br>CV at transfer (2 years dep at Rs. 3m): Rs. 24m<br>Profit on transfer: Rs. 30m − Rs. 24m = Rs. 6m<br>With transfer (Dec 2013): 30 − 30/8 = Rs. 26.25m<br>Without transfer: 24 − 3 = Rs. 21m<br>URP = 26.25 − 21 = <b>Rs. 5.25 million</b>", "Hard"], ["Riyasat Limited acquired 116m of Farasat's 145m ordinary shares for Rs. 210m cash + one Rs. 100 10% loan note per 200 shares acquired. Total consideration?", ["Rs. 258 million", "Rs. 275 million", "Rs. 268 million", "Rs. 210 million"], 2, "Cash: Rs. 210m + Loan notes: 116m/200 × Rs. 100 = Rs. 58m<br>Total = <b>Rs. 268 million</b>", "Medium"]], "9": [["Abrish Limited acquired 80% of Shazim on 1 July 2012. Post-acquisition Abrish sold Rs. 12m goods (cost Rs. 9m) to Shazim. During year Shazim sold Rs. 10m (at cost to Shazim) for Rs. 15m. Effect on group cost of sales?", ["Increase Rs. 11.5 million", "Decrease Rs. 11.5 million", "Decrease Rs. 12 million", "Decrease Rs. 9.6 million"], 1, "<b>Step-by-step:</b><ul><li>Cancel intra-group: −Rs. 12m</li><li>URP on remaining inventory (Rs. 2m × 25%): +Rs. 0.5m</li><li>Net decrease = <b>Rs. 11.5 million</b></li></ul>", "Hard"], ["Bilal Limited sells inventory costing Rs. 30m to subsidiary Sohail for Rs. 45m. Half in inventory at year end. Bilal sales Rs. 150m, COGS Rs. 75m. Sohail sales Rs. 120m, COGS Rs. 60m. Consolidated revenue and gross profit?", ["Rs. 270m; Rs. 127.5m", "Rs. 225m; Rs. 120m", "Rs. 225m; Rs. 127.5m", "Rs. 270m; Rs. 120m"], 2, "<b>Revenue:</b> 150 + 120 − 45 = Rs. 225m<br><b>URP:</b> Profit Rs. 15m × 50% = Rs. 7.5m<br><b>COGS:</b> 75 + 60 − 45 + 7.5 = Rs. 97.5m<br><b>GP:</b> 225 − 97.5 = <b>Rs. 127.5 million</b>", "Hard"], ["Halim Limited owns 55% of Namal. Namal profit after tax Rs. 72m. Halim sold Rs. 36m goods to Namal at 40% markup. Two thirds sold externally. NCI in consolidated P&L?", ["Rs. 72 million", "Rs. 32.4 million", "Nil", "Rs. 40 million"], 1, "URP is DOWNSTREAM (Halim to Namal), so affects HALIM's profit, not Namal's. No NCI adjustment needed.<br>NCI = 45% × Rs. 72m = <b>Rs. 32.4 million</b>", "Hard"], ["Bushra Limited had revenue Rs. 600m. Subsidiary Ansari Rs. 300m. Bushra sold Rs. 20m to Ansari at Rs. 5m profit. All sold externally by year end. Consolidated revenue?", ["Rs. 900 million", "Rs. 895 million", "Rs. 605 million", "Rs. 880 million"], 3, "Consolidated revenue = 600 + 300 − 20 intra-group = <b>Rs. 880 million</b>. Intra-group sales fully cancelled regardless of external sale status.", "Medium"], ["A Limited acquired 60% of B on 1 July 2016 and gave B Rs. 500m 8% loan. Finance costs year to 31 December: A Rs. 200m; B Rs. 70m. Consolidated finance costs?", ["Rs. 215 million", "Rs. 230 million", "Rs. 250 million", "Rs. 225 million"], 3, "B post-acq finance cost (6 months): Rs. 35m. Intra-group interest to eliminate: Rs. 500m × 8% × 6/12 = Rs. 20m<br>Consolidated = 200 + 25 (B pre-acq) + 25 (B post-acq) − 20 intra-group = <b>Rs. 225 million</b>", "Hard"]], "10": [["Fahad Limited bought 30% of Mahad on 1 July 20X4. Mahad profit Rs. 400m. Impairment Rs. 10m at year end. Share of profit from associate in P&L?", ["Rs. 60 million", "Rs. 50 million", "Rs. 110 million", "Rs. 57 million"], 1, "Share of post-acq profit: 30% × Rs. 400m × 6/12 = Rs. 60m<br>Less impairment: Rs. 10m<br><b>Share of profit = Rs. 50 million</b>", "Medium"], ["Best Limited has 60% subsidiary Better and 40% associate Good. Each has profit after tax Rs. 150m. Consolidated PAT?", ["Rs. 300 million", "Rs. 450 million", "Rs. 360 million", "Rs. 390 million"], 2, "<b>Best: Rs. 150m + Better (100%): Rs. 150m + Good (40%): Rs. 60m = Rs. 360 million</b><br>Associate: only share included as single line.", "Medium"], ["Ansar Limited has 90% subsidiary Fine and 40% associate Ishaq. Turnover: Ansar Rs. 360m, Fine Rs. 270m, Ishaq Rs. 180m. Consolidated revenue?", ["Rs. 810 million", "Rs. 675 million", "Rs. 603 million", "Rs. 630 million"], 3, "Associate revenue NEVER included. Only Parent + Subsidiary = 360 + 270 = <b>Rs. 630 million</b>", "Easy"], ["Reliance Group acquired 24,000 of Alia Limited's 80,000 shares (30%) at Rs. 60 per share on 1 April 2014. Alia PAT for year to 30 Sept: Rs. 400,000. Investment in associate at 30 Sept 2014?", ["Rs. 1,395,000", "Rs. 1,455,000", "Rs. 1,515,000", "Rs. 1,500,000"], 3, "<b>Cost:</b> 24,000 × Rs. 60 = Rs. 1,440,000<br><b>Share of profit (6 months × 30%):</b> Rs. 400,000 × 6/12 × 30% = Rs. 60,000<br><b>Total = Rs. 1,500,000</b>", "Medium"], ["Yooshay owns 30% of Hussain, purchased 1 May 2017 for Rs. 2.5m. Hussain retained earnings at acquisition Rs. 5.3m. At 31 October 2017: Rs. 6.4m after Rs. 1m dividend. Yooshay sold Rs. 700,000 goods at 30% profit on 30 September. Hussain holds all these goods. Investment in Hussain?", ["Rs. 2,830,000", "Rs. 2,893,000", "Rs. 2,767,000", "Rs. 2,875,000"], 2, "<b>Cost:</b> Rs. 2,500,000<br><b>+ 30% × (6.4m − 5.3m):</b> Rs. 330,000<br><b>− URP (700k × 30% × 30%):</b> Rs. 63,000<br><b>= Rs. 2,767,000</b>", "Hard"], ["Zarqoon owns 30% of Emerald. Emerald sold Rs. 160,000 goods to Zarqoon at 33.33% markup on cost. 25% held. Deduction from consolidated retained earnings?", ["Rs. 40,000", "Rs. 10,000", "Rs. 12,000", "Rs. 3,000"], 3, "Profit: 160,000 × 33.33/133.33 = Rs. 40,000<br>URP (25%): Rs. 10,000<br>Group share (30%): <b>Rs. 3,000</b>", "Hard"]], "11": [["Rock owned 70% of Cliff. Cost Rs. 2,000. NCI at fair value Rs. 800. Net assets at acquisition Rs. 1,900. Sale proceeds Rs. 3,000. Net assets at disposal Rs. 2,400. Group gain?", ["Rs. 300", "Rs. 500", "Rs. 650", "Rs. 1,000"], 2, "<b>Goodwill:</b> 2,000 + 800 − 1,900 = Rs. 900<br><b>NCI at disposal:</b> 800 + 30% × (2,400 − 1,900) = Rs. 950<br><b>Gain:</b> 3,000 + 950 − 2,400 − 900 = <b>Rs. 650</b>", "Hard"], ["Buying additional shares from NCI while retaining control results in:", ["Gain/loss to P&L", "Adjustment to Goodwill", "Equity transaction — no P&L", "OCI"], 2, "Control retained = Equity transaction only. No goodwill adjustment. No P&L. Difference to Group Equity.", "Medium"], ["Step acquisition — previous investment becomes subsidiary:", ["Ignored in goodwill", "Included at original cost", "Remeasured to Fair Value at date of control, gain/loss to P&L", "Written off"], 2, "Previous holding remeasured to Fair Value. Fair Value used in goodwill calculation. Any gain/loss to P&L.", "Medium"], ["Subsidiary acquired exclusively for resale is classified under:", ["IFRS 3 as normal subsidiary", "IFRS 10 as investment entity", "IFRS 9 as financial asset", "IFRS 5 as held-for-sale disposal group"], 3, "IFRS 5 disposal group. Measured at fair value less costs to sell.", "Medium"]], "12": [["Parent P owns 80% of Subsidiary S. S owns 60% of Sub-subsidiary T. P's effective ownership of T?", ["48%", "60%", "80%", "20%"], 0, "P × S = 80% × 60% = <b>48%</b>. However T still fully consolidated (control chain).", "Easy"], ["In same P-S-T group, total NCI in T?", ["40%", "20%", "48%", "52%"], 3, "Direct NCI: 40% + Indirect (20% × 60%): 12% = <b>52%</b>", "Hard"], ["Acquisition date for sub-subsidiary is:", ["Earlier of the two dates", "Date parent acquired subsidiary", "Date subsidiary acquired sub-subsidiary", "LATER of the two dates"], 3, "Later of two dates — group control requires BOTH links to exist.", "Medium"], ["Mixed group — Parent owns direct % + indirect via subsidiary. Total group holding formula?", ["Direct % only", "Direct + (Parent's % in Sub × Sub's % in Target)", "Higher of direct or indirect", "Sum of all interests"], 1, "Total = Direct + (Parent's % in Sub × Sub's % in Target). Example: 60% + (80% × 20%) = 76%", "Hard"]], "13": [["Star Limited bought goods from Morgan for £80,000 on 19 December 20X9. Rate £1 = Rs. 186. Purchases recorded at:", ["Rs. 14,560,000", "Rs. 14,800,000", "Rs. 14,880,000", "Rs. 15,040,000"], 2, "Use spot rate at transaction date: £80,000 × Rs. 186 = <b>Rs. 14,880,000</b>", "Easy"], ["Same Star Limited: year end 31 December 20X9, rate £1 = Rs. 182. Payable balance is:", ["Rs. 14,800,000", "Rs. 14,880,000", "Rs. 15,040,000", "Rs. 14,560,000"], 3, "Monetary items at closing rate: £80,000 × Rs. 182 = <b>Rs. 14,560,000</b>", "Medium"], ["Same Star Limited: paid 3 February 20X0 at £1 = Rs. 188. Exchange loss on settlement?", ["Rs. 320,000 gain", "Rs. 480,000 loss", "Rs. 480,000 gain", "Rs. 320,000 loss"], 1, "Payment: £80,000 × Rs. 188 = Rs. 15,040,000<br>Payable at YE: Rs. 14,560,000<br>Loss = <b>Rs. 480,000</b>", "Medium"], ["Which is NOT a primary indicator for functional currency (IAS 21)?", ["Currency influencing sales prices", "Currency determining competitive forces", "Currency of financing activities", "Currency of labour, material costs"], 2, "Financing activities currency is a SECONDARY indicator, not primary.", "Medium"], ["Foreign subsidiary's assets and liabilities translated at:", ["Historical rate", "Average rate", "Spot rate", "Closing rate"], 3, "Translation: Assets/Liabilities — Closing; Income/Expenses — Average; Equity — Historical; Difference — OCI", "Easy"]], "14": [["Consideration for new subsidiary Rs. 5m. Cash acquired Rs. 700k. Net investing outflow?", ["Rs. 5.7 million", "Rs. 5 million", "Rs. 700k", "Rs. 4.3 million"], 3, "Net: Rs. 5m − Rs. 700k = <b>Rs. 4.3 million</b>. IAS 7 requires net of cash acquired.", "Medium"], ["Dividends paid to Non-controlling Interest are classified as:", ["Operating", "Investing", "OCI", "Financing"], 3, "External dividends to NCI = Financing activity.", "Easy"], ["Share of associate's profit (non-cash) treated in indirect method as:", ["Add to profit", "Cash inflow in investing", "Deduct from profit before reconciliation", "Ignored"], 2, "Non-cash gain — deducted from profit. Actual dividend received shown separately in investing.", "Medium"], ["Consolidated inventory increased Rs. 400k. Rs. 100k came with new subsidiary. True operating change?", ["Rs. 100k", "Rs. 300k", "Rs. 400k", "Rs. 500k"], 1, "True operating change = 400 − 100 = <b>Rs. 300k</b>. The Rs. 100k came via acquisition, not operations.", "Hard"]], "15": [["12 million shares in 20X6 with EPS 33.3 paisas. In 20X7 earnings Rs. 5m. 1-for-4 bonus issue on 30 September 20X7. EPS for 20X7 and restated 20X6?", ["20X7: 41.7p; 20X6: 33.3p", "20X7: 33.3p; 20X6: 33.3p", "20X7: 33.3p; 20X6: 26.7p", "20X7: 39.2p; 20X6: 26.7p"], 2, "<b>Bonus is retrospective.</b> New total shares: 15m<br>EPS 20X7 = 5m/15m = 33.3p<br>Restated 20X6 = 33.3p × 4/5 = <b>26.7p</b>", "Hard"], ["Company had 12m shares in 20X6 (EPS 33.3p). In 20X7 earnings Rs. 5m. On 31 March 20X7 issued 2m shares at market value. Basic EPS 20X7?", ["Rs. 33.3p", "Rs. 41.7p", "Rs. 37.0p", "Rs. 29.6p"], 2, "<b>Weighted avg shares:</b> 12m × 3/12 + 14m × 9/12 = 3m + 10.5m = 13.5m<br>EPS = Rs. 5m / 13.5m = <b>37.0 paisas</b>", "Hard"], ["Preference dividends in EPS calculation are:", ["Added to earnings", "Subtracted from earnings", "Ignored", "Only for diluted EPS"], 1, "Basic EPS = (PAT − Pref Div) / Ord Shares. Preference dividends deducted (whether declared or not).", "Easy"]], "16": [["Operating segment information helps users see the entity through the eyes of:", ["Auditor", "Chief operating decision maker", "Tax authorities", "Regulator"], 1, "IFRS 8 'management approach': segments reflect how the Chief Operating Decision Maker views business internally.", "Easy"], ["IFRS 8 applies to:", ["All IFRS entities", "Listed companies only", "SMEs only", "Government"], 1, "IFRS 8 applies to listed companies. Voluntary for others.", "Medium"], ["Quantitative threshold for reportable segment?", ["5%", "10%", "15%", "20%"], 1, "10% threshold: revenue, profit/loss, or assets.", "Medium"], ["Total external revenue reported by operating segments must be at least:", ["50%", "60%", "75%", "90%"], 2, "75% rule: If below 75%, add more reportable segments until threshold reached.", "Medium"]], "17": [["Acid test (quick) ratio EXCLUDES:", ["Cash", "Receivables", "Inventory", "Marketable securities"], 2, "Quick Ratio = (CA − Inventory) / CL. Inventory excluded as least liquid.", "Easy"], ["Huda Limited: Sales Rs. 900k, COGS Rs. 756k, Receivables Rs. 112.5k, Payables Rs. 75.6k, Purchases Rs. 504k, Inventory Rs. 333k. Working Capital Cycle?", ["60 days", "152 days", "170 days", "261 days"], 1, "Inventory: 160.8 + Receivables: 45.6 − Payables: 54.8 = <b>151.6 days ≈ 152 days</b>", "Hard"], ["Entity has current ratio 2:1 pays off some payables using cash. Effect on current ratio?", ["Decreases", "No change", "Increases", "Depends on amount"], 2, "With ratio above 1:1, paying off liabilities INCREASES the ratio (both CA and CL decrease by equal amount).", "Hard"], ["Return on Capital Employed formula?", ["Net profit / Sales", "Profit After Tax / Total Assets", "PBIT / Capital Employed", "Gross profit / Cost"], 2, "ROCE = Profit Before Interest and Tax / Capital Employed", "Medium"], ["Care Pharmacy has current ratio 1.6, quick ratio 1.2, current liabilities Rs. 10m. Current assets?", ["Rs. 14m", "Rs. 20m", "Rs. 18m", "Rs. 16m"], 3, "CA = 1.6 × Rs. 10m = <b>Rs. 16 million</b>", "Medium"], ["Inventory turnover: opening Rs. 31m, closing Rs. 29m, sales Rs. 320m, GP margin 25%. Ratio?", ["6 times", "16 times", "11 times", "8 times"], 3, "COGS = Rs. 320m × 75% = Rs. 240m<br>Average inv = Rs. 30m<br>Ratio = 240/30 = <b>8 times</b>", "Medium"]], "18": [["Management Commentary includes:", ["Tax computations", "Nature of business, objectives, strategies, risks, prospects", "Only historical data", "Auditor's opinion"], 1, "IFRS PS 1 MC elements: nature of business, objectives, strategies, resources/risks/relationships, results and prospects, KPIs.", "Easy"], ["IFRS S2 (Climate) uses how many TCFD pillars?", ["Two", "Three", "Four", "Five"], 2, "TCFD 4 pillars: Governance, Strategy, Risk Management, Metrics and Targets.", "Easy"], ["Emissions 5,000 tCO2e; Revenue Rs. 800m. Carbon intensity per Rs. million?", ["6.25 tCO2e", "0.16 tCO2e", "500 tCO2e", "Rs. 6.25m"], 0, "5,000 / 800 = <b>6.25 tCO2e per Rs. million</b>", "Medium"], ["Physical climate risk includes:", ["Regulatory changes", "Reputational damage", "Extreme weather events", "Investor concerns"], 2, "Physical risks = direct climate impact. Transition risks = policy/regulatory.", "Medium"], ["Scope 2 GHG emissions are:", ["Direct from owned sources", "Indirect from purchased energy", "Value chain emissions", "Only Scope 3"], 1, "Scope 1: Direct. Scope 2: Purchased energy. Scope 3: Value chain.", "Medium"]], "19": [["IPSAS applies to:", ["For-profit entities", "Public sector entities", "All entities", "Listed companies"], 1, "IPSAS = International PUBLIC Sector Accounting Standards.", "Easy"], ["Grant Rs. 500k for 2-year project. Rs. 300k spent in Year 1. Accrual basis Year 1 revenue?", ["Rs. 500k", "Rs. 300k", "Rs. 250k", "Nil"], 2, "Matching: 500k/2 years = <b>Rs. 250k</b> per year (accrual basis, evenly spread with project).", "Medium"], ["IPSAS 1 requires all EXCEPT:", ["Statement of Financial Position", "Statement of Financial Performance", "Statement of Cash Flows", "Detailed employee benefit breakdown"], 3, "IPSAS 1: SFP, SFP, SOCE, Cash Flow, Budget comparison, Notes — NOT detailed employee benefit breakdown.", "Medium"], ["Non-exchange transactions in IPSAS include:", ["Sales for cash", "Taxes and transfers", "Interest income", "Rent income"], 1, "Non-exchange = no equal value exchanged. Taxes, transfers, grants are examples.", "Medium"], ["Public sector timeliness expectation?", ["3 months", "6 months", "9 months", "12 months"], 1, "IPSAS 1 recommends 6 months of reporting date.", "Easy"]], "20": [["Under IFRS for SMEs, goodwill is:", ["Not amortised — impairment tested", "Amortised over 40 years", "Amortised over useful life (default 10 years)", "Written off"], 2, "IFRS for SMEs simplifies: goodwill AMORTISED over useful life (default 10 years).", "Medium"], ["Bank Net Interest Income is:", ["Interest Earned only", "Interest Earned − Interest Expensed", "Interest / Assets", "Interest less tax"], 1, "NII = Interest Earned − Interest Expensed. Key bank profitability measure.", "Easy"], ["Premium Rs. 1m received 1 October for 12-month policy. Year end 31 December. Unearned Premium Reserve?", ["Rs. 250k", "Rs. 750k", "Rs. 1m", "Nil"], 1, "9 months unearned: 9/12 × Rs. 1m = <b>Rs. 750k</b>", "Medium"], ["Mutual fund NAV: Assets Rs. 100m, Liabilities Rs. 2m, Units 4.9m. NAV per unit?", ["Rs. 20.00", "Rs. 20.41", "Rs. 21.00", "Rs. 22.45"], 1, "(100 − 2) / 4.9 = 98/4.9 = <b>Rs. 20.00</b> approx (exact ≈ 20.00)", "Medium"], ["Insurance claims: Paid Rs. 500k, Opening reserve Rs. 200k, Closing reserve Rs. 300k. Claims incurred?", ["Rs. 400k", "Rs. 500k", "Rs. 300k", "Rs. 600k"], 3, "Claims Incurred = Paid + Change in Reserve = 500 + (300 − 200) = <b>Rs. 600k</b>", "Hard"]]}, "sections": [{"id": "A", "title": "Part A — Recognition and Measurement", "weight": "30%", "topic_ids": ["1", "2", "3", "4", "5", "6", "15", "16", "17"]}, {"id": "B", "title": "Part B — Group Financial Statements", "weight": "30%", "topic_ids": ["7", "8", "9", "10"]}, {"id": "C", "title": "Part C — Complex Group Topics", "weight": "20%", "topic_ids": ["11", "12", "13", "14"]}, {"id": "D", "title": "Part D — Specialized and Non-Financial", "weight": "20%", "topic_ids": ["18", "19", "20"]}], "case_studies": [{"id": "cs1", "title": "Case Study: Alpha Directors Share Options", "scenario": "<p><b>Based on ICMA Study Text</b></p>\n<p>Alpha Limited offered directors an option scheme based on a three-year period of service. 10 million options were granted. Options exercisable shortly after end of Year 3.</p>\n<p>Grant-date Fair Value per option: 30 paisas</p>\n<table border=1 cellpadding=4><tr><th>Date</th><th>Rights expected to vest</th></tr><tr><td>End Year 1</td><td>7 million</td></tr><tr><td>End Year 2</td><td>8 million</td></tr><tr><td>End Year 3 (actual)</td><td>9 million</td></tr></table>", "questions": [["Year 1 expense to be recognised:", ["Rs. 700,000", "Rs. 1,000,000", "Rs. 300,000", "Rs. 2,100,000"], 0, "<b>Equity-settled uses GRANT-DATE Fair Value:</b><ul><li>Expected vesters: 7 million</li><li>Grant-date Fair Value: 30 paisas</li><li>Vesting fraction: 1/3</li><li>Expense = 7m × 30p × 1/3 = <b>Rs. 700,000</b></li></ul>", "Medium"], ["Cumulative expense at end of Year 2 (8m expected):", ["Rs. 1,000,000", "Rs. 900,000", "Rs. 1,600,000", "Rs. 2,400,000"], 2, "<b>Cumulative Year 2:</b> 8m × 30p × 2/3 = <b>Rs. 1,600,000</b>", "Medium"], ["Year 2 expense:", ["Rs. 700,000", "Rs. 800,000", "Rs. 900,000", "Rs. 1,100,000"], 2, "<b>Year 2 expense:</b> Rs. 1,600,000 − Rs. 700,000 = <b>Rs. 900,000</b>", "Medium"], ["Cumulative expense at end of Year 3 (9m actual):", ["Rs. 1,600,000", "Rs. 2,700,000", "Rs. 3,600,000", "Rs. 2,100,000"], 1, "<b>Cumulative Year 3:</b> 9m × 30p × 3/3 = <b>Rs. 2,700,000</b>", "Medium"], ["Year 3 expense:", ["Rs. 1,100,000", "Rs. 900,000", "Rs. 700,000", "Rs. 300,000"], 0, "<b>Year 3 expense:</b> Rs. 2,700,000 − Rs. 1,600,000 = <b>Rs. 1,100,000</b>", "Medium"]]}, {"id": "cs2", "title": "Case Study: Ahmad Hassan and Asar Limited Consolidation", "scenario": "<p><b>Based on ICMA CAF 7 Consolidation Study Text</b></p>\n<p>Ahmad Hassan Limited acquired 70% of the Rs. 100 million equity share capital of Asar Limited for Rs. 200 million on 1 January 20X9, when Asar's retained earnings were Rs. 156 million.</p>\n<p>At 31 December 20X9:</p>\n<ul><li>Ahmad Hassan Limited retained earnings: Rs. 275 million</li><li>Asar Limited retained earnings: Rs. 177 million</li></ul>\n<p>Ahmad Hassan considers that goodwill on acquisition is impaired by 50%. Non-controlling interest is measured at fair value of Rs. 82.8 million.</p>", "questions": [["What is the goodwill at acquisition?", ["Rs. 26.8 million", "Rs. 44 million", "Rs. 82.8 million", "Rs. 200 million"], 0, "<b>Formula:</b> Consideration + NCI at fair value − Fair Value of Net Assets<br>= Rs. 200m + Rs. 82.8m − (Rs. 100m + Rs. 156m)<br>= Rs. 282.8m − Rs. 256m<br>= <b>Rs. 26.8 million</b>", "Medium"], ["What is the goodwill impairment amount (50%)?", ["Rs. 13.4 million", "Rs. 41.4 million", "Rs. 26.8 million", "Rs. 6.7 million"], 0, "Impairment = 50% × Rs. 26.8m = <b>Rs. 13.4 million</b>", "Easy"], ["What is Asar's post-acquisition profit?", ["Rs. 156 million", "Rs. 21 million", "Rs. 177 million", "Rs. 118 million"], 1, "Post-acquisition profit = Rs. 177m − Rs. 156m = <b>Rs. 21 million</b>", "Easy"], ["What is group share (70%) of Asar's post-acquisition profit?", ["Rs. 14.7 million", "Rs. 21 million", "Rs. 6.3 million", "Rs. 15 million"], 0, "Group share = 70% × Rs. 21m = <b>Rs. 14.7 million</b>", "Easy"], ["What is the group share (70%) of goodwill impairment?", ["Rs. 6.7 million", "Rs. 9.38 million", "Rs. 13.4 million", "Rs. 4.02 million"], 1, "Group share of impairment = 70% × Rs. 13.4m = <b>Rs. 9.38 million</b>", "Medium"], ["What are the total group retained ea
