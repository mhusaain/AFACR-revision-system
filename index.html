rnings at 31 December 20X9?", ["Rs. 275 million", "Rs. 289.7 million", "Rs. 280.32 million", "Rs. 276.3 million"], 2, "<b>Total:</b><br>= Ahmad Hassan (Rs. 275m) + 70% Asar post-acq (Rs. 14.7m) − 70% impairment (Rs. 9.38m)<br>= <b>Rs. 280.32 million</b>", "Hard"]]}, {"id": "cs3", "title": "Case Study: Zaviar and Pearl Limited Sale-Repurchase", "scenario": "<p><b>Based on ICMA Study Text Chapter 1</b></p>\n<p>Zaviar sells its head office (cost Rs. 10 million) to Pearl Limited (a bank) for Rs. 10 million on 1 January. Zaviar has the option to repurchase the property on 31 December, four years later, at Rs. 12 million.</p>\n<p>Zaviar will continue to use the property as normal throughout the period and so is responsible for maintenance and insurance.</p>\n<p>The head office was valued at transfer on 1 January at Rs. 18 million and is expected to rise in value throughout the four-year period.</p>", "questions": [["What is the substance of the transaction?", ["Genuine sale with gain of Rs. 8 million", "Operating lease", "Secured loan with finance cost", "Consignment arrangement"], 2, "<b>Substance analysis:</b><ul><li>Pearl faces risk of falling property prices</li><li>Zaviar insures and maintains the property</li><li>Zaviar benefits from rising prices</li><li>Zaviar has continued use</li><li>Property valued at Rs. 18m — much higher than sale price of Rs. 10m</li></ul>This is a secured loan with effective interest.", "Medium"], ["Should Zaviar continue to recognise the head office as an asset?", ["No — it has been sold", "Yes — Zaviar retains substantial risks and rewards", "Only 50% due to option", "Only for 4 years"], 1, "Zaviar continues to recognise the head office because substance shows it retains substantial risks and rewards of ownership.", "Easy"], ["What is the total effective interest over 4 years?", ["Rs. 12 million", "Rs. 10 million", "Rs. 2 million", "Rs. 8 million"], 2, "Effective interest = Rs. 12m repayment − Rs. 10m loan = <b>Rs. 2 million</b>", "Easy"], ["What is the approximate annual effective interest rate (simple)?", ["12% per annum", "10% per annum", "5% per annum", "2% per annum"], 2, "Simple annual rate = Rs. 2m / (Rs. 10m × 4 years) = <b>5% per annum</b>", "Medium"]]}], "formulas": [["Goodwill", "Consideration + NCI at Acquisition + FV of Previous Holding MINUS FV of Net Assets"], ["Non-controlling Interest (Closing)", "NCI at acquisition + share post-acq profit − dividends − URP (if S seller)"], ["Effective Ownership (Sub-sub)", "Parent % in Subsidiary × Subsidiary % in Sub-subsidiary"], ["Recoverable Amount", "Higher of Fair Value Less Costs of Disposal AND Value in Use"], ["Basic Earnings Per Share", "(Profit After Tax − Preference Dividend) / Weighted Average Ordinary Shares"], ["Diluted EPS", "Adjusted Earnings / (Weighted Avg + Potential Ordinary Shares if dilutive)"], ["Amortised Cost", "Opening + (Opening × Effective Interest Rate) − Cash Received"], ["Unrealised Profit", "Unsold Selling Price × Profit Margin percentage"], ["Foreign Sub Translation", "Assets/Liabilities: Closing; Income: Average; Equity: Historical; Diff: OCI"], ["Defined Benefit P&L", "Service Cost + Net Interest on net obligation"], ["Equity-Settled SBP", "Grant-Date FV × Expected Vesting × Time / Total Vesting"], ["Cash-Settled SBP", "Current FV × Expected Vesting × Time / Total Vesting (remeasured)"], ["Working Capital Cycle", "Inventory Days + Receivables Days − Payables Days"], ["Return on Capital Employed", "PBIT / Capital Employed"], ["Net Interest Income (Bank)", "Interest Earned − Interest Expensed"], ["Insurance Claims Incurred", "Claims Paid + Change in Outstanding Reserve"], ["Net Asset Value per Unit", "(Total Assets − Total Liabilities) / Units Outstanding"], ["TERP (Rights Issue)", "(Existing shares × cum-rights price + New shares × rights price) / Total shares"]], "matching": [{"title": "Match Standard to Topic", "pairs": [["IAS 21", "Effects of Foreign Exchange Rates"], ["IFRS 10", "Consolidated Financial Statements"], ["IFRS 3", "Business Combinations"], ["IFRS 13", "Fair Value Measurement"], ["IAS 28", "Associates and Joint Ventures"], ["IFRS 11", "Joint Arrangements"], ["IAS 33", "Earnings Per Share"], ["IFRS 9", "Financial Instruments"], ["IAS 19", "Employee Benefits"], ["IFRS 8", "Operating Segments"]]}, {"title": "Match Transaction to Substance Treatment", "pairs": [["Sale and repurchase agreement", "Secured loan with finance cost"], ["Consignment inventory", "Dealer's asset at delivery"], ["Factoring with recourse", "Loan on security of receivables"], ["Sale and finance leaseback", "Defer profit over lease term"], ["Downstream URP (parent to sub)", "Reduce group RE and inventory"], ["Loss of control", "P&L gain/loss and FV of retained interest"]]}, {"title": "Match Foreign Currency Item to Rate", "pairs": [["Monetary items at year end", "Closing rate"], ["Non-monetary at historical cost", "Historical rate"], ["Foreign sub Assets/Liabilities", "Closing rate"], ["Foreign sub Income/Expenses", "Average rate"], ["Foreign sub Equity at acquisition", "Historical rate"], ["Translation exchange difference", "OCI (translation reserve)"]]}]};

let state={completed:{},bookmarks:[],scores:{}};
try{const s=localStorage.getItem('afacrV11');if(s)state=Object.assign(state,JSON.parse(s));}catch(e){}
function saveState(){try{localStorage.setItem('afacrV11',JSON.stringify(state));}catch(e){}}
let quiz={type:null,id:null,title:'',questions:[],idx:0,answers:[],scenario:null};
let selectedDiff='All';
let theme='light';try{theme=localStorage.getItem('theme')||'light';}catch(e){}
document.documentElement.setAttribute('data-theme',theme);
function toggleTheme(){theme=theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',theme);try{localStorage.setItem('theme',theme);}catch(e){}}
let fs=15;try{fs=parseInt(localStorage.getItem('fs')||'15');}catch(e){}
document.body.style.setProperty('--font-size',fs+'px');
function changeFontSize(d){fs=Math.max(12,Math.min(20,fs+d));document.body.style.setProperty('--font-size',fs+'px');try{localStorage.setItem('fs',fs);}catch(e){}}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('on');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('on');}
function ic(name,size){size=size||16;return `<span class="icon" style="width:${size}px;height:${size}px;display:inline-flex;align-items:center;justify-content:center">${ICONS[name]||''}</span>`;}
function findTopic(tid){return DATA.topics.find(t=>t.id===tid);}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function filterByDiff(qs,diff){if(!diff||diff==='All')return qs;return qs.filter(q=>q[4]===diff);}
function renderNav(){
let h='';let total=0,done=0;
DATA.topics.forEach(t=>{total++;if(state.completed[t.id])done++;});
const pct=total>0?Math.round(done/total*100):0;
h+=`<div style='padding:12px;background:var(--accent);border-radius:10px;margin-bottom:12px'><b style='display:flex;align-items:center;gap:6px;font-size:13px'>${ic('chart')} Progress: ${done}/${total} (${pct}%)</b><div class='progress'><div class='bar' style='width:${pct}%'></div></div></div>`;
h+=`<button class='navbtn special' onclick='navClick(()=>showDashboard())'>${ic('dashboard')}<span class='navbtn-content'>Dashboard</span></button>`;
h+=`<button class='navbtn special' onclick='navClick(()=>showMatching())'>${ic('puzzle')}<span class='navbtn-content'>Matching Exercises</span></button>`;
h+=`<button class='navbtn special' onclick='navClick(()=>showCaseStudies())'>${ic('book')}<span class='navbtn-content'>ICMA Case Studies</span></button>`;
DATA.sections.forEach(s=>{
h+=`<div class='section-title'>${s.title} (${s.weight})</div>`;
s.topic_ids.forEach(tid=>{const t=findTopic(tid);if(!t)return;const cls=state.completed[tid]?'done':'';const chk=state.completed[tid]?`<span class='navcheck'>${ic('check')}</span>`:'';h+=`<button class='navbtn ${cls}' onclick='navClick(()=>showTopic("${tid}"))'>${chk}<span class='navbtn-content'>${tid}. ${t.title}</span></button>`;});
h+=`<button class='navbtn section-test' onclick='navClick(()=>startSectionTest("${s.id}"))'>${ic('play')}<span class='navbtn-content'>Section ${s.id} Test</span></button>`;
});
h+=`<div class='section-title'>Final</div>`;
h+=`<button class='navbtn special' onclick='navClick(()=>startFinalExam())'>${ic('trophy')}<span class='navbtn-content'>Full Mock Exam</span></button>`;
h+=`<button class='navbtn' onclick='navClick(()=>showHome())'>${ic('home')}<span class='navbtn-content'>Home</span></button>`;
h+=`<button class='navbtn' onclick='resetProgress()'>${ic('refresh')}<span class='navbtn-content'>Reset Progress</span></button>`;
document.getElementById('sidebar').innerHTML=h;
}
function navClick(fn){closeSidebar();fn();window.scrollTo(0,0);}
function showHome(){
const total=DATA.topics.length;const done=Object.keys(state.completed).length;
const totalMcqs=Object.values(DATA.mcqs).reduce((s,a)=>s+a.length,0);
document.getElementById('main').innerHTML=`<div class='card gradient'><h2>${ic('graduation',26)} Welcome to Your AFACR Revision System</h2><p style='margin:8px 0 0;line-height:1.6'>Complete self-study platform for ICMA Pakistan AFACR paper. All MCQs are scenario-based with detailed step-by-step workings.</p></div>
<div class='card'><h3>${ic('target')} How to Use</h3><ol style='line-height:1.9'><li>Click any topic in the sidebar to read the detailed lesson with ICMA examples.</li><li>Attempt topic MCQs — every question shows FULL step-by-step working.</li><li>Navigate using question palette and Previous/Next buttons.</li><li>Attempt Section Tests and Full Mock Exam when ready.</li><li>Practice with ICMA Case Studies for exam-style multi-part questions.</li></ol></div>
<div class='card'><h3>${ic('chart')} Your Statistics</h3><div class='dashboard-card'><div class='stat-num'>${done}/${total}</div><div class='stat-label'>Topics Completed</div></div><div class='dashboard-card'><div class='stat-num'>${totalMcqs}</div><div class='stat-label'>Total MCQs</div></div><div class='dashboard-card'><div class='stat-num'>${state.bookmarks.length}</div><div class='stat-label'>Bookmarks</div></div><div class='dashboard-card'><div class='stat-num'>${Object.keys(state.scores).length}</div><div class='stat-label'>Tests Taken</div></div></div>
<div class='card' style='background:var(--tip-bg);border-left:4px solid var(--tip-border)'><h3 style='color:#92400e'>${ic('bulb')} Study Tip</h3><p style='margin:0'>AFACR MCQs are worth 2-5 marks each and are scenario-based. Read the entire scenario carefully, identify key figures, and work through step-by-step.</p></div>`;
}
function setDiff(btn,d){document.querySelectorAll('.diff-selector button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedDiff=d;}
function markComplete(tid){state.completed[tid]=true;saveState();renderNav();showTopic(tid);}
function showTopic(tid){
const t=findTopic(tid);if(!t){showHome();return;}
const section=DATA.sections.find(s=>s.topic_ids.includes(tid));
const availQs=(DATA.mcqs[tid]||[]).length;
document.getElementById('main').innerHTML=`<span class='badge'>${section.title}</span><span class='badge purple'>Weight: ${section.weight}</span>
<h2>${ic('book',22)} ${t.id}. ${t.title}</h2>
<div class='card lesson'>${t.lesson}<div class='tip'><span class='tip-icon'>${ic('bulb')}</span><div><b>Exam Tip:</b> ${t.tip}</div></div></div>
<div class='card'><h3>${ic('target')} Practice This Topic</h3><p><b>Available Questions:</b> ${availQs} scenario-based questions.</p>
<div class='diff-selector'><button onclick='setDiff(this,"All")' class='active'>All Levels</button><button onclick='setDiff(this,"Easy")'>Easy</button><button onclick='setDiff(this,"Medium")'>Medium</button><button onclick='setDiff(this,"Hard")'>Hard</button></div>
<div class='actions'><button class='act primary' onclick='startTopicQuiz("${tid}")'>${ic('play',14)} Start MCQs</button><button class='act success' onclick='markComplete("${tid}")'>${ic('check',14)} Mark Complete</button></div></div>`;
}
function startTopicQuiz(tid){const all=DATA.mcqs[tid]||[];let qs=filterByDiff(all,selectedDiff);if(qs.length===0)qs=all;quiz={type:'topic',id:tid,title:findTopic(tid).title,questions:qs,idx:0,answers:new Array(qs.length).fill(null)};showQuestion();}
function startSectionTest(sid){const section=DATA.sections.find(s=>s.id===sid);let all=[];section.topic_ids.forEach(tid=>{const topicQs=(DATA.mcqs[tid]||[]).map(q=>[...q,tid]);all=all.concat(shuffle(topicQs).slice(0,Math.max(2,Math.ceil(15/section.topic_ids.length))));});all=shuffle(all);quiz={type:'section',id:sid,title:'Section '+sid+' Test',questions:all,idx:0,answers:new Array(all.length).fill(null)};showQuestion();}
function startFinalExam(){let all=[];Object.keys(DATA.mcqs).forEach(tid=>{const qs=shuffle((DATA.mcqs[tid]||[]).map(q=>[...q,tid])).slice(0,2);all=all.concat(qs);});all=shuffle(all);quiz={type:'final',id:'final',title:'Full Mock AFACR Exam',questions:all,idx:0,answers:new Array(all.length).fill(null)};showQuestion();}
function showQuestion(){
const q=quiz.questions[quiz.idx];
const isBookmarked=state.bookmarks.some(b=>b.q===q[0]);
const answered=quiz.answers[quiz.idx];
const score=quiz.answers.filter(a=>a&&a.correct).length;
const attempted=quiz.answers.filter(a=>a).length;
let palette='';
quiz.questions.forEach((qq,i)=>{const a=quiz.answers[i];let cls='qnum';if(i===quiz.idx)cls+=' current';if(a){cls+=' answered';cls+=a.correct?' correct':' incorrect';}palette+=`<div class='${cls}' onclick='goToQ(${i})'>${i+1}</div>`;});
let optsHtml='';
q[1].forEach((o,i)=>{let cls='option';let disabled='';if(answered){disabled='disabled';if(i===q[2])cls+=' correct';if(i===answered.selected&&answered.selected!==q[2])cls+=' incorrect';}optsHtml+=`<button class='${cls}' ${disabled} onclick='selectOption(${i})'><span class='option-letter'>${String.fromCharCode(65+i)}</span><span class='option-text'>${o}</span></button>`;});
let fbHtml='';
if(answered){fbHtml=answered.correct?`<div class='feedback good'><div class='feedback-header'>${ic('check',20)} Correct!</div><div class='working'><div class='working-title'>${ic('bulb')} Step-by-Step Working:</div>${q[3]}</div></div>`:`<div class='feedback bad'><div class='feedback-header'>${ic('x',20)} Incorrect</div><div style='margin:6px 0'>Correct answer: <b>${String.fromCharCode(65+q[2])}. ${q[1][q[2]]}</b></div><div class='working'><div class='working-title'>${ic('bulb')} Step-by-Step Working:</div>${q[3]}</div></div>`;}
document.getElementById('main').innerHTML=`<h2>${ic('graduation',22)} ${quiz.title}</h2>
<div class='qmeta'><span class='badge'>Q ${quiz.idx+1}/${quiz.questions.length}</span><span class='badge success'>Score: ${score}/${attempted}</span><span class='badge'>${q[4]||'Medium'}</span><button class='bookmark-btn ${isBookmarked?"on":""}' onclick='toggleBookmark()'>${ic('bookmark',14)} ${isBookmarked?"Saved":"Save"}</button></div>
<div class='card'><h3>${ic('chart')} Question Palette</h3>
<div class='legend'><div class='legend-item'><div class='legend-swatch' style='background:var(--card)'></div>Not Answered</div><div class='legend-item'><div class='legend-swatch' style='background:var(--success-bg);border-color:var(--success)'></div>Correct</div><div class='legend-item'><div class='legend-swatch' style='background:var(--danger-bg);border-color:var(--danger)'></div>Incorrect</div><div class='legend-item'><div class='legend-swatch' style='background:var(--primary)'></div>Current</div></div>
<div class='qpalette'>${palette}</div></div>
<div class='card'><div class='lesson' style='font-weight:600;font-size:15px'>${q[0]}</div><div id='opts' style='margin-top:12px'>${optsHtml}</div>${fbHtml}
<div class='qnav'><div class='qnav-left'><button class='act secondary' onclick='previousQ()' ${quiz.idx===0?'disabled':''}>${ic('arrow-left',14)} Prev</button></div>
<div class='qnav-right'><button class='act warning' onclick='abortQuiz()'>Exit</button><button class='act primary' onclick='nextQ()' ${quiz.idx===quiz.questions.length-1?'disabled':''}>Next ${ic('arrow-right',14)}</button><button class='act success' onclick='finishQuiz()'>${ic('flag',14)} Finish</button></div></div></div>`;
window.scrollTo(0,0);
}
function selectOption(i){if(quiz.answers[quiz.idx])return;const q=quiz.questions[quiz.idx];quiz.answers[quiz.idx]={selected:i,correct:(i===q[2])};saveState();showQuestion();}
function goToQ(i){quiz.idx=i;showQuestion();}
function previousQ(){if(quiz.idx>0){quiz.idx--;showQuestion();}}
function nextQ(){if(quiz.idx<quiz.questions.length-1){quiz.idx++;showQuestion();}}
function abortQuiz(){if(confirm('Exit quiz without saving?')){showHome();}}
function finishQuiz(){const un=quiz.answers.filter(a=>!a).length;if(un>0){if(!confirm(`${un} unanswered. Finish anyway?`))return;}showResult();}
function toggleBookmark(){const q=quiz.questions[quiz.idx];const idx=state.bookmarks.findIndex(b=>b.q===q[0]);if(idx>=0)state.bookmarks.splice(idx,1);else state.bookmarks.push({q:q[0],options:q[1],answer:q[2],working:q[3],topic:q[5]||quiz.id});saveState();showQuestion();}
function showResult(){
const score=quiz.answers.filter(a=>a&&a.correct).length;const total=quiz.questions.length;const attempted=quiz.answers.filter(a=>a).length;const pct=Math.round(score/total*100);
let msg=pct>=80?'Excellent!':pct>=60?'Good — revise weak areas.':'Needs work — revise topics and try again.';
if(quiz.type==='topic'&&pct>=60){state.completed[quiz.id]=true;}
state.scores[quiz.type+'_'+quiz.id+'_'+Date.now()]={title:quiz.title,score,total,pct,date:Date.now()};
saveState();
let weakHtml='';
if(quiz.type==='section'||quiz.type==='final'){const topicScores={};quiz.questions.forEach((q,i)=>{const tid=q[5]||quiz.id;if(!topicScores[tid])topicScores[tid]={correct:0,total:0};topicScores[tid].total++;if(quiz.answers[i]&&quiz.answers[i].correct)topicScores[tid].correct++;});weakHtml=`<div class='card'><h3>${ic('chart')} Weak Area Analysis</h3>`;Object.keys(topicScores).sort().forEach(tid=>{const t=findTopic(tid);const tName=t?`${tid}. ${t.title}`:tid;const ts=topicScores[tid];const tp=Math.round(ts.correct/ts.total*100);const color=tp>=80?'var(--success)':tp>=50?'var(--tip-border)':'var(--danger)';weakHtml+=`<div style='padding:10px;margin:6px 0;background:var(--accent);border-radius:8px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid ${color}'><span><b>${tName}</b></span><b>${ts.correct}/${ts.total} (${tp}%)</b></div>`;});weakHtml+=`</div>`;}
document.getElementById('main').innerHTML=`<h2>${ic('trophy',22)} Result — ${quiz.title}</h2>
<div class='card gradient'><div class='dashboard-card' style='background:rgba(255,255,255,.2)'><div class='stat-num' style='color:#fff'>${score}/${total}</div><div class='stat-label' style='color:#fff'>Correct</div></div><div class='dashboard-card' style='background:rgba(255,255,255,.2)'><div class='stat-num' style='color:#fff'>${pct}%</div><div class='stat-label' style='color:#fff'>Percentage</div></div><div class='dashboard-card' style='background:rgba(255,255,255,.2)'><div class='stat-num' style='color:#fff'>${attempted}/${total}</div><div class='stat-label' style='color:#fff'>Attempted</div></div><div class='dashboard-card' style='background:rgba(255,255,255,.2)'><div class='stat-num' style='color:#fff'>${total-attempted}</div><div class='stat-label' style='color:#fff'>Skipped</div></div><p style='margin-top:16px;font-size:15px'>${msg}</p></div>
${weakHtml}
<div class='actions'><button class='act primary' onclick='showHome()'>${ic('home',14)} Home</button><button class='act secondary' onclick='showDashboard()'>${ic('dashboard',14)} Dashboard</button><button class='act success' onclick='reviewQuiz()'>${ic('eye',14)} Review</button></div>`;
renderNav();
}
function reviewQuiz(){quiz.idx=0;showQuestion();}
function showDashboard(){
const total=DATA.topics.length;const done=Object.keys(state.completed).length;const totalMcqs=Object.values(DATA.mcqs).reduce((s,a)=>s+a.length,0);
let scoresHtml='';
const scoresList=Object.entries(state.scores).sort((a,b)=>b[1].date-a[1].date).slice(0,10);
scoresList.forEach(([k,sc])=>{const color=sc.pct>=80?'var(--success)':sc.pct>=60?'var(--tip-border)':'var(--danger)';const date=new Date(sc.date).toLocaleString();scoresHtml+=`<div style='padding:12px;margin:6px 0;background:var(--accent);border-radius:8px;border-left:4px solid ${color}'><b>${sc.title}</b><br>${sc.score}/${sc.total} (${sc.pct}%)<br><small style='opacity:.7'>${date}</small></div>`;});
if(!scoresHtml)scoresHtml='<p style="opacity:.7"><i>No tests attempted yet.</i></p>';
let topicHtml='';
DATA.sections.forEach(s=>{const doneInSec=s.topic_ids.filter(id=>state.completed[id]).length;const pct=Math.round(doneInSec/s.topic_ids.length*100);topicHtml+=`<div style='margin:12px 0'><b>${s.title}</b> (${s.weight})<br><small>${doneInSec}/${s.topic_ids.length} completed</small><div class='progress'><div class='bar' style='width:${pct}%'></div></div></div>`;});
document.getElementById('main').innerHTML=`<h2>${ic('dashboard',22)} Study Dashboard</h2>
<div class='card'><div class='dashboard-card'><div class='stat-num'>${done}/${total}</div><div class='stat-label'>Topics Completed</div></div><div class='dashboard-card'><div class='stat-num'>${state.bookmarks.length}</div><div class='stat-label'>Bookmarks</div></div><div class='dashboard-card'><div class='stat-num'>${totalMcqs}</div><div class='stat-label'>Total MCQs</div></div><div class='dashboard-card'><div class='stat-num'>${Object.keys(state.scores).length}</div><div class='stat-label'>Tests Taken</div></div></div>
<div class='card'><h3>${ic('chart')} Section Completion</h3>${topicHtml}</div>
<div class='card'><h3>${ic('trophy')} Recent Scores</h3>${scoresHtml}</div>`;
}
function showFormulas(){
let h=`<h2>${ic('calc',22)} AFACR Formula Cheat Sheet</h2><div class='card'>`;
DATA.formulas.forEach(f=>{h+=`<div style='padding:12px;border-bottom:1px solid var(--border)'><b style='color:var(--primary);font-size:15px'>${f[0]}</b><br><span style='font-family:monospace;background:var(--accent);padding:6px 10px;border-radius:6px;display:inline-block;margin-top:6px;word-break:break-word'>${f[1]}</span></div>`;});
h+=`</div>`;
document.getElementById('modalBody').innerHTML=h;
document.getElementById('modal').classList.add('on');
}
function showBookmarks(){
let h=`<h2>${ic('bookmark',22)} Bookmarked Questions</h2>`;
if(state.bookmarks.length===0){h+=`<div class='card'><p><i>No bookmarks yet. Click Save on any question during a quiz.</i></p></div>`;}
else{state.bookmarks.forEach((b,i)=>{const t=findTopic(b.topic);h+=`<div class='card'><b>Q${i+1}: ${b.q}</b><br><small style='opacity:.7'>Topic: ${t?t.title:b.topic}</small><br>`;b.options.forEach((o,j)=>{const mark=j===b.answer?` ${ic('check',14)}`:'';const style=j===b.answer?'background:var(--success-bg);border-left:3px solid var(--success)':'';h+=`<div style='padding:8px;margin:4px 0;border-radius:6px;display:flex;align-items:center;gap:8px;${style}'>${String.fromCharCode(65+j)}. ${o}${mark}</div>`;});h+=`<div class='working'><div class='working-title'>${ic('bulb')} Working:</div>${b.working}</div><button class='act danger' style='margin-top:10px' onclick='removeBookmark(${i});showBookmarks()'>${ic('x',14)} Remove</button></div>`;});}
document.getElementById('modalBody').innerHTML=h;
document.getElementById('modal').classList.add('on');
}
function removeBookmark(i){state.bookmarks.splice(i,1);saveState();}
function showCaseStudies(){
let h=`<h2>${ic('book',22)} ICMA Case Studies</h2><div class='card'><p>Multi-part exam-style scenarios based on ICMA study text examples.</p></div>`;
DATA.case_studies.forEach(cs=>{h+=`<div class='card'><h3>${cs.title}</h3><p>${cs.questions.length} sub-questions</p><button class='act primary' onclick='startCaseStudy("${cs.id}")'>${ic('play',14)} Start</button></div>`;});
document.getElementById('main').innerHTML=h;
}
function startCaseStudy(csid){const cs=DATA.case_studies.find(c=>c.id===csid);quiz={type:'case',id:csid,title:cs.title,questions:cs.questions,idx:0,answers:new Array(cs.questions.length).fill(null),scenario:cs.scenario};showCaseQuestion();}
function showCaseQuestion(){
const q=quiz.questions[quiz.idx];const answered=quiz.answers[quiz.idx];const score=quiz.answers.filter(a=>a&&a.correct).length;const attempted=quiz.answers.filter(a=>a).length;
let palette='';quiz.questions.forEach((qq,i)=>{const a=quiz.answers[i];let cls='qnum';if(i===quiz.idx)cls+=' current';if(a){cls+=' answered';cls+=a.correct?' correct':' incorrect';}palette+=`<div class='${cls}' onclick='goToCaseQ(${i})'>${i+1}</div>`;});
let optsHtml='';q[1].forEach((o,i)=>{let cls='option';let disabled='';if(answered){disabled='disabled';if(i===q[2])cls+=' correct';if(i===answered.selected&&answered.selected!==q[2])cls+=' incorrect';}optsHtml+=`<button class='${cls}' ${disabled} onclick='selectCaseOption(${i})'><span class='option-letter'>${String.fromCharCode(65+i)}</span><span class='option-text'>${o}</span></button>`;});
let fbHtml='';if(answered){fbHtml=answered.correct?`<div class='feedback good'><div class='feedback-header'>${ic('check',20)} Correct!</div><div class='working'><div class='working-title'>${ic('bulb')} Working:</div>${q[3]}</div></div>`:`<div class='feedback bad'><div class='feedback-header'>${ic('x',20)} Incorrect</div><div>Correct: <b>${String.fromCharCode(65+q[2])}. ${q[1][q[2]]}</b></div><div class='working'><div class='working-title'>${ic('bulb')} Working:</div>${q[3]}</div></div>`;}
document.getElementById('main').innerHTML=`<h2>${ic('book',22)} ${quiz.title}</h2>
<div class='card lesson'><h3>${ic('bulb')} Scenario</h3>${quiz.scenario}</div>
<div class='qmeta'><span class='badge'>Sub-Q ${quiz.idx+1}/${quiz.questions.length}</span><span class='badge success'>Score: ${score}/${attempted}</span></div>
<div class='card'><h3>${ic('chart')} Question Palette</h3><div class='qpalette'>${palette}</div></div>
<div class='card'><div class='lesson' style='font-weight:600;font-size:15px'>${q[0]}</div><div id='opts' style='margin-top:12px'>${optsHtml}</div>${fbHtml}
<div class='qnav'><div class='qnav-left'><button class='act secondary' onclick='prevCaseQ()' ${quiz.idx===0?'disabled':''}>${ic('arrow-left',14)} Prev</button></div>
<div class='qnav-right'><button class='act warning' onclick='abortQuiz()'>Exit</button><button class='act primary' onclick='nextCaseQ()' ${quiz.idx===quiz.questions.length-1?'disabled':''}>Next ${ic('arrow-right',14)}</button><button class='act success' onclick='finishCaseQuiz()'>${ic('flag',14)} Finish</button></div></div></div>`;
window.scrollTo(0,0);
}
function selectCaseOption(i){if(quiz.answers[quiz.idx])return;const q=quiz.questions[quiz.idx];quiz.answers[quiz.idx]={selected:i,correct:(i===q[2])};saveState();showCaseQuestion();}
function goToCaseQ(i){quiz.idx=i;showCaseQuestion();}
function prevCaseQ(){if(quiz.idx>0){quiz.idx--;showCaseQuestion();}}
function nextCaseQ(){if(quiz.idx<quiz.questions.length-1){quiz.idx++;showCaseQuestion();}}
function finishCaseQuiz(){const un=quiz.answers.filter(a=>!a).length;if(un>0){if(!confirm(`${un} unanswered. Finish?`))return;}showResult();}
let currentMatching=null;let matchState={};let selectedMatchItem=null;
function showMatching(){
let h=`<h2>${ic('puzzle',22)} Matching Exercises</h2><div class='card'><p><b>How to use:</b> Tap an item on right to select. Tap slot on left to place. Tap filled slot to clear.</p></div>`;
DATA.matching.forEach((m,i)=>{h+=`<div class='card'><h3>${m.title}</h3><p>${m.pairs.length} items</p><button class='act primary' onclick='startMatching(${i})'>${ic('play',14)} Start</button></div>`;});
document.getElementById('main').innerHTML=h;
}
function startMatching(idx){currentMatching=DATA.matching[idx];matchState={};selectedMatchItem=null;currentMatching._shuffled=shuffle(currentMatching.pairs.map(p=>p[1]));renderMatching();}
function renderMatching(){
const shuffled=currentMatching._shuffled;
let leftHtml='',rightHtml='';
currentMatching.pairs.forEach((p,i)=>{const placed=matchState[i];leftHtml+=`<div style='padding:10px;background:var(--card);border-radius:8px;margin:8px 0;border:1px solid var(--border)'><b>${p[0]}</b><div class='match-slot' data-idx='${i}' onclick='slotClick(${i})'>${placed||'Tap here to place item'}</div></div>`;});
shuffled.forEach((item)=>{const used=Object.values(matchState).includes(item);const isSel=selectedMatchItem===item;rightHtml+=`<div class='match-item ${used?"used":""} ${isSel?"selected":""}' onclick='itemClick("${item.replace(/"/g,"&quot;")}")'>${item}</div>`;});
document.getElementById('main').innerHTML=`<h2>${ic('puzzle',22)} ${currentMatching.title}</h2>
<div class='card'><p><b>Instructions:</b> Tap an item on right, then tap slot on left.</p></div>
<div class='matching-grid'><div class='match-col'><h4>Items</h4>${leftHtml}</div><div class='match-col'><h4>Definitions</h4>${rightHtml}</div></div>
<div class='actions'><button class='act primary' onclick='checkMatching()'>${ic('check',14)} Check Answers</button><button class='act warning' onclick='clearMatching()'>${ic('refresh',14)} Clear All</button><button class='act secondary' onclick='showMatching()'>${ic('arrow-left',14)} Back</button></div>`;
window.scrollTo(0,0);
}
function itemClick(item){if(Object.values(matchState).includes(item))return;selectedMatchItem=selectedMatchItem===item?null:item;renderMatching();}
function slotClick(idx){if(matchState[idx]){delete matchState[idx];renderMatching();return;}if(selectedMatchItem){matchState[idx]=selectedMatchItem;selectedMatchItem=null;renderMatching();}else{alert('First tap an item on right to select.');}}
function clearMatching(){matchState={};selectedMatchItem=null;renderMatching();}
function checkMatching(){
let correct=0;let feedback='<div style="margin-top:12px">';
currentMatching.pairs.forEach((p,i)=>{if(matchState[i]===p[1]){correct++;feedback+=`<div style='padding:8px;margin:4px 0;background:var(--success-bg);border-radius:6px;display:flex;align-items:center;gap:8px'>${ic('check',14)} ${p[0]} → ${p[1]}</div>`;}else feedback+=`<div style='padding:8px;margin:4px 0;background:var(--danger-bg);border-radius:6px;display:flex;align-items:center;gap:8px'>${ic('x',14)} ${p[0]} → Correct: <b>${p[1]}</b>${matchState[i]?' | Your: '+matchState[i]:' | Not answered'}</div>`;});
feedback+='</div>';
const pct=Math.round(correct/currentMatching.pairs.length*100);
const msg=pct>=80?'Excellent!':pct>=60?'Good effort.':'Practice more.';
document.getElementById('main').innerHTML=`<h2>${ic('trophy',22)} ${currentMatching.title} — Result</h2>
<div class='card gradient'><div class='stat-num' style='color:#fff'>${correct}/${currentMatching.pairs.length} (${pct}%)</div><p style='color:#fff;margin-top:8px'>${msg}</p></div>
<div class='card'><h3>Answers</h3>${feedback}</div>
<div class='actions'><button class='act primary' onclick='startMatching(DATA.matching.indexOf(currentMatching))'>${ic('refresh',14)} Try Again</button><button class='act secondary' onclick='showMatching()'>${ic('arrow-left',14)} Back</button></div>`;
}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function resetProgress(){if(!confirm('Reset ALL progress, scores, and bookmarks?'))return;state={completed:{},bookmarks:[],scores:{}};saveState();renderNav();showHome();}
renderNav();
showHome();
</script>
</body>
</html>
